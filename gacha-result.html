<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GACHA PULL</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#07060e; --card-bg:#16142a; --gold:#ffd700; --gold-dim:#b8960f;
  --accent:#ff6b35; --text:#e8e4f0; --muted:#6b6580; --border:#2a2745;
  --common:#8a8a9a; --rare:#3b9eff; --sr:#a855f7; --ur:#ff3366; --leg:#ffd700;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Poppins',sans-serif;
  background: transparent;
  color:#3b9eff;
  min-height:100vh; overflow-x:hidden;
}

/* Flash */
#gp-flash {
  position:fixed; inset:0; pointer-events:none; z-index:10; opacity:0;
}
#gp-flash.active { animation:gpfl .7s ease-out forwards; }
@keyframes gpfl { 0%{opacity:.8} 100%{opacity:0} }

/* Layout */
.gp-wrap {
  max-width:100%; margin:0 auto;
  padding:12px 10px 20px;
}
.gp-header {
  text-align:center; margin-bottom:12px;
}
#gp-title {
  font-family:'Cinzel',serif; font-weight:900;
  font-size:clamp(1rem,4vw,1.4rem);
  color:#000000;
  letter-spacing:2px;
}
.gp-sub { color:#000000; font-size:.72rem; margin-top:4px; letter-spacing:1px; }

/* Grid */
.gp-grid {
  display:flex; flex-wrap:wrap; justify-content:center;
  gap:8px;
  max-height:none;
  padding:4px 2px;
}

/* Card slot */
.gp-slot {
  opacity:0;
  animation:gpDrop .8s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes gpDrop {
  0%  { opacity:1; transform:scale(0.1); }
  40% { opacity:1; transform:scale(1.2); }
  70% { opacity:1; transform:scale(1.05); }
  100%{ opacity:1; transform:scale(1); }
}

/* Card */
.gp-card {
  width:clamp(140px,36vw,180px);
  height:clamp(196px,50.4vw,252px);
  border-radius:10px; border:2px solid var(--border);
  background:rgba(22,20,42,0.7);
  display:flex; flex-direction:column;
  overflow:hidden; position:relative;
  transition:transform .2s;
  cursor:pointer;
}
.gp-card:hover { transform:translateY(-5px) scale(1.08); }

/* Holo effect SR+ */
.gp-card.r-superRare::after,
.gp-card.r-ultraRare::after,
.gp-card.r-legendary::after {
  content:''; position:absolute; inset:0; border-radius:inherit;
  background:linear-gradient(135deg,transparent 20%,rgba(255,255,255,.08) 40%,transparent 60%,rgba(255,255,255,.05) 80%,transparent);
  background-size:200% 200%;
  animation:holo 3s ease-in-out infinite; pointer-events:none; z-index:5;
}
@keyframes holo { 0%,100%{background-position:0% 0%} 50%{background-position:100% 100%} }

.gp-card-header {
  display:flex; justify-content:space-between; align-items:center;
  padding:5px 7px 2px; position:relative; z-index:2;
}
.gp-name { font-family:'Poppins',sans-serif; font-weight:700; font-size:clamp(.7rem,3vw,.94rem); color:#ffffff; }
.gp-hp   { font-weight:700; font-size:clamp(.68rem,2.8vw,.9rem); color:#ffffff; }

.gp-art {
  flex:1; display:flex; align-items:center; justify-content:center;
  position:relative; margin:2px 7px; border-radius:5px; overflow:hidden; min-height:0;
}
.gp-art-bg { position:absolute; inset:0; opacity:.35; }
.gp-icon   { font-size:clamp(2rem,7vw,3rem); z-index:1; filter:drop-shadow(0 2px 4px rgba(0,0,0,.4)); }

.gp-info { padding:3px 7px 5px; position:relative; z-index:2; }
.gp-type   { font-size:clamp(.5rem,2.2vw,.72rem); color:#ffffff; margin-bottom:1px; }
.gp-skill  { display:flex; justify-content:space-between; font-size:clamp(.5rem,2.2vw,.72rem); font-weight:600; margin-bottom:1px; color:#ffffff; }
.gp-rarity { font-size:clamp(.48rem,2vw,.7rem); text-align:right; font-weight:700; letter-spacing:1px; color:#ffffff; }

/* Summary */
.gp-summary {
  display:flex; justify-content:center; gap:clamp(10px,2.5vw,20px);
  margin-top:clamp(12px,2vw,20px); flex-wrap:wrap;
  animation:gpFadeUp .5s ease forwards;
}
@keyframes gpFadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.gp-sum-item { text-align:center; }
.gp-sum-num  { display:block; font-family:'Poppins',sans-serif; font-size:clamp(1.3rem,5vw,1.8rem); font-weight:900; color:#3b9eff; }
.gp-sum-label{ display:block; font-size:clamp(.6rem,2.2vw,.72rem); color:#3b9eff; margin-top:2px; letter-spacing:1px; }

/* Responsive */
@media(max-width:480px) {
  .gp-grid { gap:10px; max-height:60vh; }
  .gp-card { width:clamp(150px,40vw,170px); height:clamp(210px,56vw,238px); }
}
@media(max-width:360px) {
  .gp-card { width:clamp(130px,42vw,155px); height:clamp(182px,58.8vw,217px); }
}
</style>
</head>
<body>

<div id="gp-flash"></div>

<div class="gp-wrap">
  <div class="gp-header">
    <h1 id="gp-title" style="font-family:'Cinzel',serif;font-weight:900;font-size:clamp(1.6rem,6vw,3rem);color:#000000;letter-spacing:3px">GACHA</h1>
    <p class="gp-sub">Hasil Pull Kamu</p>
  </div>

  <div class="gp-grid" id="gp-grid"></div>
  <div id="gp-summary"></div>
</div>

<script src="js/gacha-pull.js"></script>
</body>
</html>
