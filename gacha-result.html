<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GACHA PULL</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Cinzel:wght@700;900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --c-blue:#3a4cca;
  --c-red:#fc0102;
  --c-yellow:#ffd700;
  --c-epic:#c084fc;
  --c-rare:#60a5fa;
  --c-common:#9ca3af;
}
*{margin:0;padding:0;box-sizing:border-box;scrollbar-width:none;-ms-overflow-style:none;}
*::-webkit-scrollbar{display:none;}
body{
  font-family:'Poppins',sans-serif;
  background:transparent;
  min-height:100vh;
  overflow-x:hidden;
  scrollbar-width:none;
  -ms-overflow-style:none;
}
body::-webkit-scrollbar{display:none;}

/* ===== FLASH ===== */
#gp-flash{position:fixed;inset:0;pointer-events:none;z-index:50;opacity:0;}
#gp-flash.active{animation:gpfl .7s ease-out forwards;}
@keyframes gpfl{0%{opacity:.9}100%{opacity:0}}

/* ===== HEADER — 3-warna ===== */
.gp-header{text-align:center;padding:10px 10px 6px;}
#gp-title{
  font-family:'Bangers',cursive;
  font-size:clamp(2rem,7vw,3.2rem);
  letter-spacing:4px;
  /* Gradient 3 warna: biru → merah → kuning */
  background:linear-gradient(90deg, var(--c-blue) 0%, var(--c-red) 50%, var(--c-yellow) 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 2px 10px rgba(58,76,202,.5));
}
.gp-sub{
  font-family:'Poppins',sans-serif;
  font-size:.75rem;
  /* Alternating color via gradient */
  background:linear-gradient(90deg, var(--c-blue), var(--c-red), var(--c-yellow));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  letter-spacing:2px;
  text-transform:uppercase;
  margin-top:2px;
}

/* ===== GRID — scrollable ===== */
.gp-wrap{
  padding:8px 10px 16px;
  max-height:calc(100vh - 80px);
  overflow-y:auto;
  scrollbar-width:none;
}
.gp-wrap::-webkit-scrollbar{display:none;}

.gp-grid{
  display:flex;flex-wrap:wrap;justify-content:center;
  gap:12px;padding:4px 2px;
}

/* ===== CARD SLOT ===== */
.gp-slot{
  perspective:900px;
  opacity:0;
  animation:slotAppear .5s ease forwards;
}
@keyframes slotAppear{
  from{opacity:0;transform:translateY(24px) scale(.9);}
  to{opacity:1;transform:translateY(0) scale(1);}
}

/* ===== CARD WRAP — ukuran lebih besar, aspect ratio kartu pokemon ===== */
.gp-card-wrap{
  width:clamp(150px,22vw,190px);
  height:clamp(210px,30.8vw,266px);
  position:relative;
  transform-style:preserve-3d;
  cursor:pointer;
  transition:transform .65s cubic-bezier(.4,0,.2,1);
}
.gp-card-wrap.flipped{transform:rotateY(180deg);}

/* Hover efek untuk x10/x100 (kartu sudah flipped) */
.gp-card-wrap.flipped:hover{
  transform:rotateY(180deg) translateY(-6px) scale(1.05);
}
/* Hover efek untuk x1 (belum flipped) */
.gp-card-wrap:hover:not(.flipped){
  transform:rotateY(12deg) scale(1.04);
}

/* Card faces */
.gp-card-face{
  position:absolute;inset:0;
  border-radius:14px;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  overflow:hidden;
}

/* Back face */
.gp-card-back{
  background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
  border:2px solid rgba(58,76,202,.4);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 24px rgba(0,0,0,.5);
}
.gp-card-back::before{
  content:'';position:absolute;inset:8px;
  border:1px solid rgba(58,76,202,.2);border-radius:10px;
}
.gp-card-back-logo{
  font-family:'Bangers',cursive;font-size:2.4rem;letter-spacing:3px;
  background:linear-gradient(135deg,var(--c-blue),var(--c-red),var(--c-yellow));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  opacity:.85;
}

/* Front face — gambar penuh, tidak terpotong */
.gp-card-front{
  transform:rotateY(180deg);
  background:#111;
  border:2px solid rgba(255,255,255,.1);
  box-shadow:0 8px 24px rgba(0,0,0,.5);
  display:flex;align-items:center;justify-content:center;
}
.gp-card-front img{
  width:100%;
  height:100%;
  object-fit:contain;   /* ← contain agar tidak terpotong */
  display:block;
  background:#111;
}
.gp-card-front .gp-rarity-bar{
  position:absolute;bottom:0;left:0;right:0;
  padding:5px 8px;
  font-family:'Bangers',cursive;font-size:.9rem;letter-spacing:1px;
  text-align:center;backdrop-filter:blur(8px);
}

/* Rarity borders & static glow */
.gp-card-wrap.legendary .gp-card-front{border-color:var(--c-yellow);box-shadow:0 0 18px rgba(255,215,0,.5),0 8px 24px rgba(0,0,0,.5);}
.gp-card-wrap.legendary .gp-rarity-bar{background:rgba(255,215,0,.9);color:#000;}
.gp-card-wrap.epic .gp-card-front{border-color:var(--c-epic);box-shadow:0 0 14px rgba(192,132,252,.4),0 8px 24px rgba(0,0,0,.5);}
.gp-card-wrap.epic .gp-rarity-bar{background:rgba(192,132,252,.9);color:#fff;}
.gp-card-wrap.rare .gp-card-front{border-color:var(--c-rare);box-shadow:0 0 10px rgba(96,165,250,.3),0 8px 24px rgba(0,0,0,.5);}
.gp-card-wrap.rare .gp-rarity-bar{background:rgba(96,165,250,.9);color:#fff;}
.gp-card-wrap.common .gp-rarity-bar{background:rgba(80,80,80,.9);color:#fff;}

/* Holo shimmer legendary/epic */
.gp-card-wrap.legendary .gp-card-front::after,
.gp-card-wrap.epic .gp-card-front::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,transparent 20%,rgba(255,255,255,.12) 40%,transparent 60%,rgba(255,255,255,.08) 80%,transparent);
  background-size:200% 200%;
  animation:holo 3s ease-in-out infinite;pointer-events:none;
}
@keyframes holo{0%,100%{background-position:0% 0%}50%{background-position:100% 100%}}

/* ===== ELECTRIC + PULSE GLOW — first card (x1) ===== */
/* Pulse glow on front face */
.gp-slot.is-first .gp-card-wrap.flipped .gp-card-front{
  animation:pulseGlowBlue 1.8s ease-in-out infinite;
}
.gp-slot.is-first .gp-card-wrap.flipped.legendary .gp-card-front{animation:pulseGlowGold 1.8s ease-in-out infinite;}
.gp-slot.is-first .gp-card-wrap.flipped.epic .gp-card-front{animation:pulseGlowPurple 1.8s ease-in-out infinite;}
.gp-slot.is-first .gp-card-wrap.flipped.rare .gp-card-front{animation:pulseGlowBlue 1.8s ease-in-out infinite;}

@keyframes pulseGlowBlue{
  0%,100%{box-shadow:0 0 8px rgba(58,76,202,.4),0 0 16px rgba(58,76,202,.2);}
  50%{box-shadow:0 0 24px rgba(58,76,202,.9),0 0 48px rgba(58,76,202,.5),0 0 72px rgba(58,76,202,.2);}
}
@keyframes pulseGlowGold{
  0%,100%{box-shadow:0 0 10px rgba(255,215,0,.5),0 0 20px rgba(255,215,0,.3);}
  50%{box-shadow:0 0 30px rgba(255,215,0,1),0 0 60px rgba(255,215,0,.6),0 0 90px rgba(255,150,0,.3);}
}
@keyframes pulseGlowPurple{
  0%,100%{box-shadow:0 0 10px rgba(192,132,252,.5),0 0 20px rgba(192,132,252,.3);}
  50%{box-shadow:0 0 28px rgba(192,132,252,1),0 0 56px rgba(192,132,252,.6),0 0 84px rgba(168,85,247,.3);}
}

/* Electric shock border — first card */
.gp-slot.is-first .gp-card-wrap.flipped::before{
  content:'';position:absolute;inset:-10px;border-radius:20px;
  pointer-events:none;z-index:10;
  animation:electricShock 0.14s ease-in-out infinite alternate;
}
.gp-slot.is-first .gp-card-wrap.flipped.legendary::before{animation:electricShockGold 0.11s ease-in-out infinite alternate;}
.gp-slot.is-first .gp-card-wrap.flipped.epic::before{animation:electricShockPurple 0.13s ease-in-out infinite alternate;}

@keyframes electricShock{
  0%{box-shadow:0 0 0 2px rgba(58,76,202,.9),0 0 10px 3px rgba(58,76,202,.7),0 0 20px 6px rgba(58,76,202,.4),4px -4px 0 0 rgba(255,255,255,.8),-4px 4px 0 0 rgba(252,1,2,.8);opacity:1;}
  100%{box-shadow:0 0 0 2px rgba(58,76,202,.3),0 0 5px 2px rgba(58,76,202,.2),0 0 10px 3px rgba(58,76,202,.1),-3px 3px 0 0 rgba(255,255,255,.4),3px -3px 0 0 rgba(252,1,2,.4);opacity:.6;}
}
@keyframes electricShockGold{
  0%{box-shadow:0 0 0 2px rgba(255,215,0,.9),0 0 12px 4px rgba(255,215,0,.7),0 0 24px 8px rgba(255,150,0,.4),4px -4px 0 0 rgba(255,255,255,.9),-4px 4px 0 0 rgba(255,215,0,.9);opacity:1;}
  100%{box-shadow:0 0 0 2px rgba(255,215,0,.3),0 0 5px 2px rgba(255,215,0,.2),0 0 12px 4px rgba(255,150,0,.15),-3px 3px 0 0 rgba(255,255,255,.4),3px -3px 0 0 rgba(255,215,0,.5);opacity:.5;}
}
@keyframes electricShockPurple{
  0%{box-shadow:0 0 0 2px rgba(192,132,252,.9),0 0 12px 4px rgba(192,132,252,.7),0 0 24px 8px rgba(168,85,247,.4),4px -4px 0 0 rgba(255,255,255,.9),-4px 4px 0 0 rgba(192,132,252,.9);opacity:1;}
  100%{box-shadow:0 0 0 2px rgba(192,132,252,.3),0 0 5px 2px rgba(192,132,252,.2),0 0 12px 4px rgba(168,85,247,.15),-3px 3px 0 0 rgba(255,255,255,.4),3px -3px 0 0 rgba(192,132,252,.5);opacity:.5;}
}

/* ===== HOVER ELECTRIC + PULSE — x10/x100 (semua kartu sudah flipped) ===== */
/* Hover pulse glow per rarity */
.gp-card-wrap.flipped.legendary:hover .gp-card-front{animation:pulseGlowGold 1.2s ease-in-out infinite;}
.gp-card-wrap.flipped.epic:hover .gp-card-front{animation:pulseGlowPurple 1.2s ease-in-out infinite;}
.gp-card-wrap.flipped.rare:hover .gp-card-front{animation:pulseGlowBlue 1.2s ease-in-out infinite;}
.gp-card-wrap.flipped.common:hover .gp-card-front{animation:pulseGlowCommon 1.2s ease-in-out infinite;}
@keyframes pulseGlowCommon{
  0%,100%{box-shadow:0 0 6px rgba(156,163,175,.3),0 0 12px rgba(156,163,175,.15);}
  50%{box-shadow:0 0 18px rgba(156,163,175,.7),0 0 36px rgba(156,163,175,.35);}
}

/* Hover electric border per rarity */
.gp-card-wrap.flipped.legendary:hover::before{content:'';position:absolute;inset:-8px;border-radius:18px;pointer-events:none;z-index:10;animation:electricShockGold 0.11s ease-in-out infinite alternate;}
.gp-card-wrap.flipped.epic:hover::before{content:'';position:absolute;inset:-8px;border-radius:18px;pointer-events:none;z-index:10;animation:electricShockPurple 0.13s ease-in-out infinite alternate;}
.gp-card-wrap.flipped.rare:hover::before{content:'';position:absolute;inset:-8px;border-radius:18px;pointer-events:none;z-index:10;animation:electricShock 0.14s ease-in-out infinite alternate;}
.gp-card-wrap.flipped.common:hover::before{content:'';position:absolute;inset:-8px;border-radius:18px;pointer-events:none;z-index:10;animation:electricShockCommon 0.16s ease-in-out infinite alternate;}
@keyframes electricShockCommon{
  0%{box-shadow:0 0 0 2px rgba(156,163,175,.7),0 0 8px 2px rgba(156,163,175,.5),3px -3px 0 0 rgba(255,255,255,.6);opacity:1;}
  100%{box-shadow:0 0 0 2px rgba(156,163,175,.2),0 0 4px 1px rgba(156,163,175,.15),-2px 2px 0 0 rgba(255,255,255,.3);opacity:.5;}
}

/* ===== ELECTRIC SPARK DOTS ===== */
@keyframes sparkPop{
  0%{transform:scale(1);opacity:1;}
  100%{transform:scale(0) translate(var(--sx),var(--sy));opacity:0;}
}

/* ===== CARD DETAIL MODAL ===== */
.card-detail-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.85);backdrop-filter:blur(8px);
  z-index:200;display:none;align-items:center;justify-content:center;padding:20px;
}
.card-detail-overlay.show{display:flex;}
.card-detail-box{
  background:linear-gradient(160deg,#1a1a2e,#0f3460);
  border-radius:20px;padding:24px;max-width:340px;width:100%;
  position:relative;
  animation:detailPop .3s cubic-bezier(.34,1.56,.64,1);
  border:1.5px solid rgba(58,76,202,.4);
  box-shadow:0 24px 60px rgba(0,0,0,.6),0 0 30px rgba(58,76,202,.2);
  max-height:90vh;
  overflow-y:auto;
  scrollbar-width:none;
  -ms-overflow-style:none;
}
.card-detail-box::-webkit-scrollbar{display:none;}
@keyframes detailPop{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.card-detail-close{
  position:absolute;top:14px;right:14px;
  background:rgba(255,255,255,.1);border:none;
  color:#fff;width:30px;height:30px;border-radius:50%;
  font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s;
}
.card-detail-close:hover{background:rgba(252,1,2,.4);}
.card-detail-img{width:100%;height:220px;object-fit:contain;border-radius:12px;margin-bottom:14px;background:rgba(0,0,0,.3);}
.card-detail-name{
  font-family:'Bangers',cursive;font-size:1.9rem;letter-spacing:2px;
  background:linear-gradient(90deg,var(--c-blue),var(--c-red),var(--c-yellow));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:4px;
}
.card-detail-rarity{font-size:.75rem;font-weight:700;letter-spacing:1px;padding:3px 10px;border-radius:20px;display:inline-block;margin-bottom:12px;}
.card-detail-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.card-stat{background:rgba(255,255,255,.06);border-radius:10px;padding:8px 12px;font-size:.75rem;color:rgba(255,255,255,.7);}
.card-stat strong{display:block;font-size:1rem;color:var(--c-yellow);font-weight:700;}

/* ===== SUMMARY — warna per rarity ===== */
.gp-summary{
  display:flex;justify-content:center;gap:16px;
  margin-top:14px;flex-wrap:wrap;
  animation:gpFadeUp .5s ease forwards;
}
@keyframes gpFadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.gp-sum-item{text-align:center;}
.gp-sum-num{display:block;font-family:'Bangers',cursive;font-size:1.9rem;letter-spacing:1px;}
.gp-sum-label{display:block;font-size:.6rem;font-weight:600;margin-top:1px;letter-spacing:1px;text-transform:uppercase;opacity:.8;}

/* Summary label colors */
.gp-sum-item.legendary .gp-sum-num{color:var(--c-yellow);}
.gp-sum-item.legendary .gp-sum-label{color:var(--c-yellow);}
.gp-sum-item.epic .gp-sum-num{color:var(--c-epic);}
.gp-sum-item.epic .gp-sum-label{color:var(--c-epic);}
.gp-sum-item.rare .gp-sum-num{color:var(--c-blue);}
.gp-sum-item.rare .gp-sum-label{color:var(--c-blue);}
.gp-sum-item.common .gp-sum-num{color:var(--c-red);}
.gp-sum-item.common .gp-sum-label{color:var(--c-red);}

/* ===== RESPONSIVE ===== */
@media(max-width:480px){
  .gp-card-wrap{width:clamp(120px,26vw,155px);height:clamp(168px,36.4vw,217px);}
  .gp-grid{gap:8px;}
}
</style>
</head>
<body>

<div id="gp-flash"></div>

<div class="gp-header">
  <h1 id="gp-title">GACHA</h1>
  <p class="gp-sub">Hasil Pull Kamu</p>
</div>

<div class="gp-wrap">
  <div class="gp-grid" id="gp-grid"></div>
  <div id="gp-summary"></div>
</div>

<!-- Card Detail Modal -->
<div class="card-detail-overlay" id="cardDetailOverlay" onclick="closeDetail(event)">
  <div class="card-detail-box">
    <button class="card-detail-close" onclick="closeDetailBtn()">✕</button>
    <img class="card-detail-img" id="detail-img" src="" alt="" />
    <div class="card-detail-name" id="detail-name"></div>
    <span class="card-detail-rarity" id="detail-rarity"></span>
    <div class="card-detail-stats" id="detail-stats"></div>
  </div>
</div>

<script src="js/gacha-pull.js"></script>
</body>
</html>
