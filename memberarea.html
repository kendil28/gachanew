<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>GachaKeren — Member Area</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/super-starfish" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    html, body {
      width: 100%; height: 100%;
      font-family: 'Poppins', sans-serif;
      overflow: hidden; background: #000;
      display: flex; flex-direction: column;
      position: relative; z-index: 1;
    }

    /* BG */
    .bg { position: fixed; inset: 0; background-size: cover; background-position: center; z-index: 0; }
    .bg-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1; }

    /* TOPBAR */
    .topbar {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 18px; position: relative; z-index: 10; flex-shrink: 0;
    }
    .logo img { height: 60px; filter: drop-shadow(0 2px 8px rgba(0,0,0,.5)); }
    .profile { display: flex; align-items: center; position: relative; margin-left: 8px; }
    .profile-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      border: 4px solid #e53935; background: #1a1a1a;
      overflow: hidden; flex-shrink: 0; z-index: 2;
      box-shadow: 0 0 0 3px #fff, 0 4px 12px rgba(0,0,0,.5);
    }
    .avatar-img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
    .profile-card { display: flex; flex-direction: column; margin-left: -16px; z-index: 1; }
    .profile-username {
      background: #e53935; color: #fff; font-size: 14px; font-weight: 700;
      padding: 5px 18px 5px 24px;
      clip-path: polygon(0 0,100% 0,92% 100%,0 100%); min-width: 150px;
    }
    .profile-id {
      background: #fffced; color: #1a1a1a; font-size: 11px; font-weight: 700;
      padding: 3px 18px 3px 24px;
      clip-path: polygon(0 0,92% 0,84% 100%,0 100%); min-width: 130px;
      border-left: 3px solid transparent;
    }
    .topbar-right { display: flex; align-items: center; gap: 10px; margin-left: auto; }
    .currencies { display: flex; gap: 10px; }
    .currency-item {
      display: flex; align-items: center; gap: 6px;
      background: rgba(0,0,0,.6); border-radius: 30px;
      padding: 5px 10px 5px 6px; border: 2px solid rgba(255,255,255,.2);
    }
    .currency-item img { width: 28px; height: 28px; object-fit: contain; }
    .currency-item span { color: #fff; font-size: 13px; font-weight: 700; min-width: 44px; }
    .btn-plus {
      background: #4caf50; color: #fff; border: none; border-radius: 50%;
      width: 22px; height: 22px; font-size: 16px; font-weight: 900;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }

    /* LAYOUT */
    .main-layout { flex: 1; display: flex; position: relative; z-index: 5; overflow: hidden; }

    /* CONTENT AREA */
    .content-area { flex: 1; position: relative; overflow: hidden; margin-left: 92px; }
    .content-frame { width: 100%; height: 100%; border: none; display: block; }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .topbar { padding: 6px 10px; gap: 6px; }
      .logo img { height: 40px; }
      .profile-avatar { width: 46px; height: 46px; border-width: 3px; }
      .profile-card { margin-left: -10px; }
      .profile-username { font-size: 10px; padding: 3px 14px 3px 16px; min-width: 90px; }
      .profile-id { font-size: 9px; padding: 2px 12px 2px 14px; min-width: 80px; }
      .topbar-right { flex-direction: column; align-items: flex-end; gap: 3px; }
      .currencies { flex-direction: column; gap: 3px; }
      .currency-item { padding: 3px 6px 3px 5px; gap: 3px; }
      .currency-item img { width: 16px; height: 16px; }
      .currency-item span { font-size: 9px; min-width: 28px; }
      /* btn-plus tetap tampil di mobile */
      /* Full width, beri ruang untuk bottom nav */
      .content-area { margin-left: 0 !important; }
      .main-layout { overflow: visible; }
      /* iframe tinggi penuh dikurangi topbar (~60px) dan bottom nav (~80px) */
      .content-frame { height: calc(100vh - 60px - 80px); }
    }
    @media (max-width: 480px) {
      .topbar { padding: 5px 8px; gap: 4px; }
      .logo img { height: 34px; }
      .profile-avatar { width: 38px; height: 38px; }
      .profile-username { font-size: 9px; min-width: 76px; }
      .profile-id { font-size: 8px; min-width: 68px; }
      /* Perkecil tapi tetap tampil */
      .currency-item span { font-size: 8px; min-width: 22px; display: block; }
      .currency-item img { width: 14px; height: 14px; }
      .currency-item { padding: 3px 4px; gap: 2px; }
      .btn-plus { width: 14px; height: 14px; font-size: 10px; }
      .content-area { margin-left: 0 !important; }
      .content-frame { height: calc(100vh - 55px - 80px); }
    }
  </style>
</head>
<body>

  <div class="bg" style="background-image:url('assets/images/backgrounds/background.png')"></div>
  <div class="bg-overlay"></div>

  <header class="topbar">
    <div class="logo"><img src="assets/images/ui/logoweb.png" alt="GachaKeren"/></div>
    <div class="profile">
      <div class="profile-avatar"><img src="assets/images/icons/icon/pokemon.png" alt="avatar" class="avatar-img"/></div>
      <div class="profile-card">
        <div class="profile-username">Username</div>
        <div class="profile-id">ID 608</div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="currencies">
        <div class="currency-item"><img src="assets/images/icons/icon/koin.png" alt="koin"/><span id="ma-bal-koin">20.15M</span><button class="btn-plus" onclick="openTopupMA('koin')">+</button></div>
        <div class="currency-item"><img src="assets/images/icons/icon/diamond.png" alt="diamond"/><span id="ma-bal-diamond">20.15M</span><button class="btn-plus" onclick="openTopupMA('diamond')">+</button></div>
        <div class="currency-item"><img src="assets/images/icons/icon/flash.png" alt="flash"/><span id="ma-bal-flash">20.15M</span><button class="btn-plus" onclick="openTopupMA('flash')">+</button></div>
      </div>
    </div>
  </header>

  <div class="main-layout">
    <div class="content-area">
      <iframe id="contentFrame" class="content-frame"
        src="pages/deposit.html"
        frameborder="0" scrolling="auto"></iframe>
    </div>
  </div>

  <script>
    (function() {
      var pageMap = {
        'deposit':    'pages/deposit.html',
        'withdraw':   'pages/withdraw.html',
        'profile':    'pages/profile.html',
        'leaderboard':'pages/leaderboard.html',
        'legendary':  'pages/legendary-board.html',
        'koleksi':    'pages/semua-kartu.html',
        'kirimkartu': 'pages/kartu-fisik.html',
        'jualkartu':  'pages/kartu-fisik.html',
      };
      var page = new URLSearchParams(window.location.search).get('page');
      if (page && pageMap[page]) {
        document.getElementById('contentFrame').src = pageMap[page];
      }
    })();
  </script>
  <script src="js/sidebar-nav.js"></script>

  <!-- TOPUP SYSTEM -->
  <script>
    var maBalances = {
      koin:    parseFloat(sessionStorage.getItem('bal-koin')    || 20150000),
      diamond: parseFloat(sessionStorage.getItem('bal-diamond') || 20150000),
      flash:   parseFloat(sessionStorage.getItem('bal-flash')   || 20150000),
    };
    function maFormat(n) {
      if (n >= 1000000) return (n/1000000).toFixed(2)+'M';
      if (n >= 1000)    return (n/1000).toFixed(1)+'K';
      return n.toString();
    }
    function maRefresh() {
      var k = document.getElementById('ma-bal-koin');
      var d = document.getElementById('ma-bal-diamond');
      var f = document.getElementById('ma-bal-flash');
      if (k) k.textContent = maFormat(maBalances.koin);
      if (d) d.textContent = maFormat(maBalances.diamond);
      if (f) f.textContent = maFormat(maBalances.flash);
    }
    maRefresh();

    var maTopupConfig = {
      koin:    { title:'🪙 Top Up Koin',    icon:'assets/images/icons/icon/koin.png',    color:'#f59e0b',
        packages:[{label:'1.000',amount:1000,price:'Rp 1.000',bonus:''},{label:'5.000',amount:5000,price:'Rp 4.500',bonus:'+500 Bonus'},{label:'10.000',amount:10000,price:'Rp 8.500',bonus:'+1.500 Bonus',popular:true},{label:'50.000',amount:50000,price:'Rp 40.000',bonus:'+10.000 Bonus'},{label:'100.000',amount:100000,price:'Rp 75.000',bonus:'+25.000 Bonus'},{label:'500.000',amount:500000,price:'Rp 350.000',bonus:'+150.000 Bonus',best:true}]},
      diamond: { title:'💎 Top Up Diamond', icon:'assets/images/icons/icon/diamond.png', color:'#3b82f6',
        packages:[{label:'60',amount:60,price:'Rp 15.000',bonus:''},{label:'300',amount:300,price:'Rp 70.000',bonus:'+30 Bonus'},{label:'980',amount:980,price:'Rp 200.000',bonus:'+80 Bonus',popular:true},{label:'1.980',amount:1980,price:'Rp 380.000',bonus:'+200 Bonus'},{label:'3.280',amount:3280,price:'Rp 600.000',bonus:'+400 Bonus'},{label:'6.480',amount:6480,price:'Rp 1.100.000',bonus:'+1.000 Bonus',best:true}]},
      flash:   { title:'⚡ Top Up Flash',   icon:'assets/images/icons/icon/flash.png',   color:'#8b5cf6',
        packages:[{label:'10',amount:10,price:'Rp 5.000',bonus:''},{label:'50',amount:50,price:'Rp 22.000',bonus:'+5 Bonus'},{label:'100',amount:100,price:'Rp 40.000',bonus:'+15 Bonus',popular:true},{label:'300',amount:300,price:'Rp 110.000',bonus:'+50 Bonus'},{label:'500',amount:500,price:'Rp 175.000',bonus:'+100 Bonus'},{label:'1.000',amount:1000,price:'Rp 320.000',bonus:'+250 Bonus',best:true}]},
    };
    var maCurrentCurrency = null;

    function openTopupMA(type) {
      maCurrentCurrency = type;
      var cfg = maTopupConfig[type];
      var overlay = document.getElementById('maTopupOverlay');
      if (!overlay) { buildMATopupModal(); overlay = document.getElementById('maTopupOverlay'); }
      document.getElementById('maTopupTitle').textContent = cfg.title;
      document.getElementById('maTopupBalance').textContent = maFormat(maBalances[type]);
      document.getElementById('maTopupIcon').src = cfg.icon;
      var pkgHtml = '';
      cfg.packages.forEach(function(p, i) {
        var badge = p.best ? '<span style="position:absolute;top:0;left:50%;transform:translateX(-50%);font-size:8px;font-weight:700;padding:2px 8px;border-radius:0 0 8px 8px;background:linear-gradient(90deg,#ffd700,#ff9800);color:#000;">TERBAIK</span>'
                   : p.popular ? '<span style="position:absolute;top:0;left:50%;transform:translateX(-50%);font-size:8px;font-weight:700;padding:2px 8px;border-radius:0 0 8px 8px;background:#3b82f6;color:#fff;">POPULER</span>' : '';
        pkgHtml += '<div onclick="maBuyPackage('+i+')" style="position:relative;background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.12);border-radius:12px;padding:12px 6px 10px;text-align:center;cursor:pointer;transition:transform .2s;" onmouseover="this.style.transform=\'scale(1.04)\'" onmouseout="this.style.transform=\'scale(1)\'">'
          + badge
          + '<div style="font-family:Poppins,sans-serif;font-size:15px;font-weight:900;color:#fff;margin:8px 0 4px;">' + p.label + '</div>'
          + '<img src="' + cfg.icon + '" style="width:22px;height:22px;object-fit:contain;display:block;margin:0 auto 4px;"/>'
          + (p.bonus ? '<div style="font-size:9px;font-weight:700;color:#4ade80;margin-bottom:2px;">' + p.bonus + '</div>' : '')
          + '<div style="font-size:10px;color:rgba(255,255,255,0.55);">' + p.price + '</div>'
          + '</div>';
      });
      document.getElementById('maTopupPackages').innerHTML = pkgHtml;
      document.getElementById('maTopupCustomInput').value = '';
      overlay.style.display = 'flex';
    }

    function buildMATopupModal() {
      var html = '<div id="maTopupOverlay" onclick="if(event.target===this)closeTopupMA()" style="position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(6px);z-index:9999;display:none;align-items:center;justify-content:center;padding:16px;">'
        + '<div style="background:linear-gradient(160deg,#1a1a2e,#16213e,#0f3460);border:1.5px solid rgba(255,255,255,0.12);border-radius:22px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;padding:22px;position:relative;scrollbar-width:none;">'
        + '<button onclick="closeTopupMA()" style="position:absolute;top:14px;right:14px;background:rgba(255,255,255,0.1);border:none;color:#fff;width:30px;height:30px;border-radius:50%;font-size:16px;cursor:pointer;">✕</button>'
        + '<div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;">'
        + '<div style="width:48px;height:48px;border-radius:12px;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;"><img id="maTopupIcon" src="" style="width:30px;height:30px;object-fit:contain;"/></div>'
        + '<div><div id="maTopupTitle" style="font-family:Poppins,sans-serif;font-size:17px;font-weight:700;color:#fff;"></div>'
        + '<div style="font-size:12px;color:rgba(255,255,255,0.5);">Saldo: <span id="maTopupBalance" style="color:#ffd700;font-weight:700;"></span></div></div></div>'
        + '<div id="maTopupPackages" style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;"></div>'
        + '<div style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px;">'
        + '<div style="font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:8px;">Atau masukkan jumlah:</div>'
        + '<div style="display:flex;gap:8px;">'
        + '<input id="maTopupCustomInput" type="number" placeholder="0" style="flex:1;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:10px;color:#fff;font-size:14px;padding:10px 12px;outline:none;"/>'
        + '<button onclick="maBuyCustom()" style="background:linear-gradient(135deg,#ffd700,#ff9800);border:none;border-radius:10px;color:#000;font-weight:700;font-size:13px;padding:10px 18px;cursor:pointer;">Beli</button>'
        + '</div></div>'
        + '<div style="font-size:11px;color:rgba(255,255,255,0.3);text-align:center;margin-top:12px;">💡 Pembelian menggunakan saldo Rupiah akun kamu</div>'
        + '</div></div>';
      document.body.insertAdjacentHTML('beforeend', html);
    }

    function closeTopupMA() {
      var o = document.getElementById('maTopupOverlay');
      if (o) o.style.display = 'none';
    }

    function maBuyPackage(idx) {
      var cfg = maTopupConfig[maCurrentCurrency];
      var pkg = cfg.packages[idx];
      sessionStorage.setItem('topup_currency', maCurrentCurrency);
      sessionStorage.setItem('topup_label', pkg.label);
      sessionStorage.setItem('topup_bonus', pkg.bonus||'');
      sessionStorage.setItem('topup_price', pkg.price);
      closeTopupMA();
      // Arahkan ke deposit
      document.getElementById('contentFrame').src = 'pages/deposit.html?topup=1';
    }

    function maBuyCustom() {
      var val = parseInt(document.getElementById('maTopupCustomInput').value);
      if (!val || val < 1) return;
      sessionStorage.setItem('topup_currency', maCurrentCurrency);
      sessionStorage.setItem('topup_label', val.toLocaleString('id'));
      sessionStorage.setItem('topup_bonus', '');
      sessionStorage.setItem('topup_price', '');
      closeTopupMA();
      document.getElementById('contentFrame').src = 'pages/deposit.html?topup=1';
    }
  </script>
</body>
</html>
