<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartoon Gacha - Withdraw</title>
    <link href="https://fonts.googleapis.com/css2?family=Rowdies:wght@300;400;700&display=swap" rel="stylesheet">
        <style>
        :root {
            --btn-radius: 12px;
            --card-radius: 20px;
            --input-radius: 10px;
            --glossy-size: 14px;
            --outline-color: #2a1b0e;
            --shadow-hard: 5px 5px 0px rgba(0, 0, 0, 0.35);
        }
        body {
            background: transparent;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            margin: 0; font-family: 'Rowdies', cursive; padding: 20px; box-sizing: border-box;
        }
        .deposit-container {
            position: relative; width: 100%; max-width: 700px;
            background: rgba(255,255,255,0.15);
            border: 4px solid transparent;
            background-image: linear-gradient(rgba(255,255,255,0.15),rgba(255,255,255,0.15)), linear-gradient(45deg,#ff6b6b,#feca57,#48dbfb,#ff9ff3);
            background-origin: border-box; background-clip: padding-box, border-box;
            border-radius: 25px; padding: 30px; box-sizing: border-box;
            backdrop-filter: blur(15px);
            box-shadow: 0 0 30px rgba(255,107,107,0.3), 0 0 60px rgba(252,202,87,0.2), 10px 10px 0px rgba(0,0,0,0.2);
            animation: containerGlow 3s ease-in-out infinite alternate;
        }
        @keyframes containerGlow {
            0%   { box-shadow: 0 0 30px rgba(255,107,107,0.3), 0 0 60px rgba(252,202,87,0.2), 10px 10px 0px rgba(0,0,0,0.2); }
            100% { box-shadow: 0 0 40px rgba(72,219,251,0.4), 0 0 80px rgba(255,159,243,0.3), 10px 10px 0px rgba(0,0,0,0.2); }
        }
        .header { position: relative; width: 100%; margin-bottom: 30px; z-index: 2; }
        .header-bg {
            position: absolute; width: 100%; height: 65px; bottom: 0; left: 0;
            background: linear-gradient(169.13deg,#ff6b6b 0%,#feca57 50%,#48dbfb 100%);
            border: 4px solid transparent;
            background-image: linear-gradient(169.13deg,#ff6b6b 0%,#feca57 50%,#48dbfb 100%), linear-gradient(45deg,#ff9ff3,#feca57,#48dbfb);
            background-origin: border-box; background-clip: padding-box, border-box;
            border-radius: 12px 12px 24px 24px;
            box-sizing: border-box; z-index: 1; box-shadow: var(--shadow-hard);
            animation: headerPulse 2s ease-in-out infinite;
        }
        @keyframes headerPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.02)} }
        .header-tabs { position: relative; width: 100%; display: flex; justify-content: space-between; gap: 12px; z-index: 3; }
        .tab-btn-wrap { position: relative; flex: 1; display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
        .tab-btn-wrap .tab-icon { position: absolute; top: 0; width: 45px; height: 45px; z-index: 10; filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.3)); transition: all 0.3s cubic-bezier(0.4,0,0.2,1); pointer-events: none; }
        .tab-btn-wrap:hover .tab-icon { filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.4)) brightness(1.1); }
        .tab-btn-wrap:has(.active-main) .tab-icon { filter: drop-shadow(3px 3px 0px rgba(0,0,0,0.4)) brightness(1.2); animation: iconFloat 2s ease-in-out infinite; }
        @keyframes iconFloat { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-3px)} }
        .tab-btn {
            position: relative; width: 100%; height: 70px; border-radius: 16px; border: 4px solid transparent;
            color: #FFF; font-family: 'Rowdies', cursive; font-weight: 700; font-size: 1.2rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-sizing: border-box; box-shadow: var(--shadow-hard);
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            text-shadow: 2px 2px 0px rgba(0,0,0,0.5); background: #888; filter: brightness(0.7); overflow: hidden;
        }
        .tab-btn::before { content:''; position:absolute; top:-2px; left:-2px; right:-2px; bottom:-2px; background:linear-gradient(45deg,transparent,rgba(255,255,255,0.3),transparent); transform:translateX(-100%); transition:transform 0.6s; z-index:-1; }
        .tab-btn:hover::before { transform:translateX(100%); }
        .tab-btn::after { content:''; position:absolute; width:var(--glossy-size); height:calc(var(--glossy-size)*1.8); top:12px; left:16px; background:linear-gradient(143.13deg,#FFF 20%,rgba(255,255,255,0) 53.65%); border-radius:50%; pointer-events:none; }
        .tab-btn.active-main { filter:brightness(1.2); transform:translateY(-5px) scale(1.05); box-shadow:0 10px 25px rgba(0,0,0,0.4),0 0 20px rgba(255,255,255,0.3); animation:tabGlow 2s ease-in-out infinite; }
        @keyframes tabGlow { 0%,100%{box-shadow:0 10px 25px rgba(0,0,0,0.4),0 0 20px rgba(255,255,255,0.3)} 50%{box-shadow:0 10px 25px rgba(0,0,0,0.4),0 0 30px rgba(255,255,255,0.5)} }
        .tab-btn:active { transform:translate(2px,2px); box-shadow:2px 2px 0px rgba(0,0,0,0.35); }
        .tab-blue { background:linear-gradient(135deg,#667eea 0%,#764ba2 50%,#48dbfb 100%); border-color:transparent; }
        .tab-red  { background:linear-gradient(135deg,#ff6b6b 0%,#ff8e53 50%,#feca57 100%); border-color:transparent; }
        .title { width:100%; text-align:center; font-size:2.2rem; line-height:100%; letter-spacing:-0.05em; color:#fff; -webkit-text-stroke:2px var(--outline-color); margin-bottom:25px; paint-order:stroke fill; text-shadow:4px 4px 0px rgba(0,0,0,0.3); }
        .form-card {
            position:relative; width:100%;
            background:linear-gradient(135deg,#fff9e6 0%,#fef3c7 50%,#fde68a 100%);
            border:5px solid transparent;
            background-image:linear-gradient(135deg,#fff9e6 0%,#fef3c7 50%,#fde68a 100%),linear-gradient(45deg,#ff6b6b,#feca57,#48dbfb,#ff9ff3);
            background-origin:border-box; background-clip:padding-box,border-box;
            border-radius:var(--card-radius); box-sizing:border-box; padding:45px 35px 55px 35px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2),0 0 20px rgba(252,202,87,0.3);
            overflow:visible; animation:cardFloat 4s ease-in-out infinite;
        }
        @keyframes cardFloat { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-5px)} }
        .corner { position:absolute; width:110px; height:auto; z-index:5; pointer-events:none; filter:drop-shadow(3px 3px 0px rgba(0,0,0,0.2)) brightness(1.2); }
        .corner-tl { top:-18px; left:-18px; transform:rotate(0deg); animation:cornerGlow 3s ease-in-out infinite; }
        .corner-tr { top:-18px; right:-18px; transform:rotate(90deg); animation:cornerGlow 3s ease-in-out infinite 0.5s; }
        .corner-br { bottom:-25px; right:-18px; transform:rotate(180deg); animation:cornerGlow 3s ease-in-out infinite 1s; }
        .corner-bl { bottom:-25px; left:-18px; transform:rotate(-90deg); animation:cornerGlow 3s ease-in-out infinite 1.5s; }
        @keyframes cornerGlow { 0%,100%{filter:drop-shadow(3px 3px 0px rgba(0,0,0,0.2)) brightness(1.2)} 50%{filter:drop-shadow(3px 3px 0px rgba(0,0,0,0.2)) brightness(1.5) drop-shadow(0 0 10px rgba(255,255,255,0.5))} }
        .form-group { margin-bottom: 25px; }
        .label-bold { font-weight:700; font-size:1.1rem; color:#2a1b0e; display:block; margin-bottom:8px; }
        .input-box {
            width:100%; height:55px;
            background:linear-gradient(135deg,#fff 0%,#f8fafc 100%);
            border:3px solid transparent;
            background-image:linear-gradient(135deg,#fff 0%,#f8fafc 100%),linear-gradient(45deg,#ff6b6b,#feca57,#48dbfb);
            background-origin:border-box; background-clip:padding-box,border-box;
            border-radius:var(--input-radius); box-sizing:border-box;
            font-family:'Rowdies',cursive; font-weight:400; font-size:1.3rem; color:#2a1b0e;
            padding:0 15px; outline:none;
            box-shadow:inset 2px 2px 0px rgba(0,0,0,0.1),0 0 10px rgba(252,202,87,0.2);
            transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        .input-box:focus { box-shadow:inset 2px 2px 0px rgba(0,0,0,0.1),0 0 20px rgba(72,219,251,0.4),0 0 30px rgba(72,219,251,0.2); transform:scale(1.02); }
        .select-container { position:relative; width:100%; }
        .select-container::after { content:'▼'; position:absolute; right:15px; top:50%; transform:translateY(-50%); font-size:1.2rem; color:var(--outline-color); pointer-events:none; }
        .select-box {
            width:100%; height:55px;
            background:linear-gradient(135deg,#fff 0%,#f8fafc 100%);
            border:3px solid transparent;
            background-image:linear-gradient(135deg,#fff 0%,#f8fafc 100%),linear-gradient(45deg,#ff6b6b,#feca57,#48dbfb);
            background-origin:border-box; background-clip:padding-box,border-box;
            border-radius:var(--input-radius); box-sizing:border-box;
            font-family:'Rowdies',cursive; font-weight:400; font-size:1.2rem; color:#2a1b0e;
            padding:0 15px; outline:none; appearance:none; -webkit-appearance:none; cursor:pointer;
            box-shadow:inset 2px 2px 0px rgba(0,0,0,0.1),0 0 10px rgba(252,202,87,0.2);
            transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        .select-box:focus { box-shadow:inset 2px 2px 0px rgba(0,0,0,0.1),0 0 20px rgba(72,219,251,0.4),0 0 30px rgba(72,219,251,0.2); transform:scale(1.02); }
        .limit-box { background:#FFF3CD; border:3px solid #FFEE58; border-radius:var(--input-radius); padding:15px; margin-bottom:25px; box-shadow:4px 4px 0px rgba(0,0,0,0.15); text-align:center; font-size:1.1rem; color:#856404; }
        .limit-box strong { color:#d62828; font-size:1.3rem; }
        .wallet-box { background:#fff; border:3px solid var(--outline-color); border-radius:15px; padding:15px 20px; margin-bottom:20px; box-shadow:4px 4px 0px rgba(0,0,0,0.15); display:flex; flex-direction:column; gap:10px; }
        .wallet-label-row { display:flex; justify-content:space-between; align-items:center; }
        .wallet-label { font-weight:700; font-size:0.9rem; color:var(--outline-color); text-transform:uppercase; }
        .info-display { background:#f8f9fa; border:2px solid #ced4da; border-radius:8px; padding:10px 15px; font-weight:400; font-size:1.1rem; color:#495057; }
        .input-group-transfer { display:flex; gap:15px; align-items:stretch; }
        .input-group-transfer .input-box { flex:1; }
        .all-in-btn { width:120px; background:linear-gradient(180deg,#ffee55 0%,#f7b30b 100%); border:3px solid var(--outline-color); border-radius:var(--input-radius); color:var(--outline-color); font-family:'Rowdies',cursive; font-weight:700; font-size:1.2rem; cursor:pointer; box-shadow:4px 4px 0px rgba(0,0,0,0.2); transition:transform 0.1s; }
        .all-in-btn:active { transform:translate(2px,2px); box-shadow:2px 2px 0px rgba(0,0,0,0.2); }
        .error-msg { color:#d62828; font-size:0.9rem; font-weight:400; margin-top:8px; display:flex; align-items:center; gap:5px; }
        .summary-text { text-align:center; font-size:1.2rem; color:var(--outline-color); margin:20px 0; font-weight:700; }
        .summary-amount { color:#1dbf2f; font-size:1.4rem; }
        .presets { display:flex; gap:12px; margin-top:15px; }
        .preset-btn {
            position:relative; flex:1; height:50px;
            background:linear-gradient(135deg,#e0f7fa 0%,#81d4fa 100%);
            border:3px solid transparent;
            background-image:linear-gradient(135deg,#e0f7fa 0%,#81d4fa 100%),linear-gradient(45deg,#48dbfb,#0ea5e9);
            background-origin:border-box; background-clip:padding-box,border-box;
            border-radius:var(--btn-radius); color:#2a1b0e; font-family:'Rowdies',cursive;
            font-weight:700; font-size:1.2rem; cursor:pointer;
            box-shadow:4px 4px 0px rgba(0,0,0,0.2),0 0 10px rgba(72,219,251,0.3);
            transition:all 0.3s cubic-bezier(0.4,0,0.2,1); overflow:hidden;
        }
        .preset-btn::before { content:''; position:absolute; top:0; left:-100%; width:100%; height:100%; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.5),transparent); transition:left 0.5s; }
        .preset-btn:hover::before { left:100%; }
        .preset-btn.active { background:linear-gradient(135deg,#3b82f6 0%,#06b6d4 50%,#0ea5e9 100%); color:#fff; text-shadow:2px 2px 0px rgba(0,0,0,0.4); transform:scale(1.05); box-shadow:0 4px 15px rgba(0,0,0,0.3),0 0 20px rgba(72,219,251,0.4); animation:presetGlow 2s ease-in-out infinite; }
        @keyframes presetGlow { 0%,100%{box-shadow:0 4px 15px rgba(0,0,0,0.3),0 0 20px rgba(72,219,251,0.4)} 50%{box-shadow:0 4px 15px rgba(0,0,0,0.3),0 0 25px rgba(72,219,251,0.6)} }
        .action-buttons { display:flex; gap:20px; margin-top:30px; }
        .action-btn { flex:1; height:65px; border:none; border-radius:35px; font-family:'Rowdies',cursive; font-weight:700; font-size:1.4rem; cursor:pointer; box-shadow:6px 6px 0px rgba(0,0,0,0.3),0 0 15px rgba(252,202,87,0.3); transition:all 0.3s cubic-bezier(0.4,0,0.2,1); overflow:hidden; position:relative; }
        .action-btn::before { content:''; position:absolute; top:0; left:-100%; width:100%; height:100%; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.4),transparent); transition:left 0.6s; }
        .action-btn:hover::before { left:100%; }
        .action-btn:hover { transform:translateY(-3px) scale(1.05); box-shadow:0 8px 25px rgba(0,0,0,0.4),0 0 25px rgba(255,255,255,0.3); }
        .action-btn:active { transform:translate(3px,3px); box-shadow:2px 2px 0px rgba(0,0,0,0.3); }
        .reset-btn { background:linear-gradient(135deg,#ff6b6b 0%,#feca57 50%,#ff8e53 100%); color:#fff; text-shadow:2px 2px 0px rgba(0,0,0,0.3); }
        .withdraw-btn { background:linear-gradient(135deg,#10b981 0%,#34d399 50%,#6ee7b7 100%); color:var(--outline-color); text-shadow:1px 1px 0px rgba(255,255,255,0.4); animation:withdrawPulse 2s ease-in-out infinite; }
        @keyframes withdrawPulse { 0%,100%{box-shadow:6px 6px 0px rgba(0,0,0,0.3),0 0 15px rgba(16,185,129,0.3)} 50%{box-shadow:6px 6px 0px rgba(0,0,0,0.3),0 0 25px rgba(16,185,129,0.5)} }
        @media (max-width: 768px) {
            body { padding-bottom:160px; align-items:flex-start; overflow-y:auto; }
            .deposit-container { padding:20px; }
            .tab-btn { height:60px; font-size:0.9rem; }
            .header-bg { height:55px; }
            .title { font-size:1.8rem; }
            .input-box, .select-box { height:50px; font-size:1rem; }
            .preset-btn, .all-in-btn { height:45px; font-size:0.9rem; }
            .action-btn { height:55px; font-size:1.1rem; }
            .corner { width:90px; }
        }
        @media (max-width: 480px) {
            body { padding-bottom:160px; align-items:flex-start; overflow-y:auto; }
            .deposit-container { padding:15px; border-radius:20px; border-width:3px; }
            .header-tabs { flex-wrap:wrap; gap:8px; row-gap:30px; }
            .tab-btn-wrap { padding-top:20px; flex-basis:calc(50% - 8px); }
            .tab-btn { width:100%; height:55px; font-size:1rem; }
            .tab-btn.active-main { transform:translateY(-3px); }
            .header-bg { height:115px; bottom:-60px; z-index:0; }
            .title { font-size:1.6rem; -webkit-text-stroke:1px var(--outline-color); }
            .form-card { padding:45px 15px 35px 15px; }
            .corner { width:75px; }
            .corner-tl { top:-12px; left:-12px; } .corner-tr { top:-12px; right:-12px; }
            .corner-br { bottom:-18px; right:-12px; } .corner-bl { bottom:-18px; left:-12px; }
            .input-group-transfer { flex-direction:column; }
            .all-in-btn { width:100%; }
            .action-buttons { flex-direction:column-reverse; }
            .presets { flex-wrap:wrap; }
            .preset-btn { flex-basis:calc(50% - 12px); }
        }
    </style>
</head>

                    <span class="wallet-label">Akun Penarikan</span>
                </div>
                <div class="select-container">
                    <select class="select-box" id="accountSelect">
                        <option>OVO - 089636614845</option>
                        <option>DANA - 081234567890</option>
                    </select>
                </div>
                <div class="info-display">OVO - 089636614845</div>
                <div class="info-display" style="font-weight: 700;">Andy Handoko</div>
                <div class="info-display">089636614845</div>
            </div>

            <!-- Form Jumlah -->
            <div class="form-group">
                <span class="label-bold">Jumlah penarikan minimal IDR 100K ( 1 = 1000 )</span>
                <div class="input-group-transfer">
                    <input type="number" class="input-box" id="withdrawInput" placeholder="Masukkan jumlah penarikan" min="0">
                    <button class="all-in-btn" id="allInBtn">ALL IN</button>
                </div>
                <div class="error-msg">
                    <span>⚠️</span> Jumlah penarikan harus lebih besar dari minimal jumlah penarikan
                </div>
            </div>

            <!-- Summary -->
            <div class="summary-text">
                Anda akan melakukan penarikan <span class="summary-amount" id="summaryAmount">0</span>
            </div>

            <!-- Presets -->
            <div class="presets">
                <button class="preset-btn" data-amount="50000">50</button>
                <button class="preset-btn" data-amount="100000">100</button>
                <button class="preset-btn" data-amount="200000">200</button>
                <button class="preset-btn" data-amount="500000">500</button>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button class="action-btn reset-btn">RESET</button>
                <button class="action-btn withdraw-btn">WITHDRAW</button>
            </div>

        </div>
    </div>

    <script>
        const withdrawInput = document.getElementById('withdrawInput');
        const summaryAmount = document.getElementById('summaryAmount');
        const presetBtns = document.querySelectorAll('.preset-btn');
        const resetBtn = document.querySelector('.reset-btn');
        const allInBtn = document.getElementById('allInBtn');

        // Fungsi format angka agar mudah dibaca (misal 500000 jadi 500.000)
        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        function updateSummary() {
            const val = withdrawInput.value || 0;
            summaryAmount.textContent = formatNumber(Number(val));
        }

        withdrawInput.addEventListener('input', function() {
            presetBtns.forEach(b => b.classList.remove('active'));
            updateSummary();
        });

        presetBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                presetBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                withdrawInput.value = this.getAttribute('data-amount');
                updateSummary();
            });
        });

        allInBtn.addEventListener('click', function() {
            presetBtns.forEach(b => b.classList.remove('active'));
            withdrawInput.value = 50000000; // 50000 K
            updateSummary();
        });

        resetBtn.addEventListener('click', function() {
            withdrawInput.value = '';
            presetBtns.forEach(b => b.classList.remove('active'));
            updateSummary();
        });
    </script>
