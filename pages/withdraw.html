<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartoon Gacha - Withdraw</title>
    <link href="https://fonts.googleapis.com/css2?family=Rowdies:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --btn-radius: 12px;
            --card-radius: 20px;
            --input-radius: 10px;
            --glossy-size: 14px;
            --outline-color: #2a1b0e;
            --shadow-hard: 5px 5px 0px rgba(0, 0, 0, 0.35);
        }

        body {
            background: transparent;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            margin: 0; font-family: 'Rowdies', cursive; padding: 20px; box-sizing: border-box;
        }

        .deposit-container {
            position: relative; width: 100%; max-width: 700px;
            background: rgba(255, 255, 255, 0.15);
            border: 4px solid transparent;
            background-image: linear-gradient(rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.15)),
                              linear-gradient(45deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            border-radius: 25px; padding: 30px; box-sizing: border-box;
            backdrop-filter: blur(15px); 
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.3),
                        0 0 60px rgba(252, 202, 87, 0.2),
                        10px 10px 0px rgba(0,0,0,0.2);
            animation: containerGlow 3s ease-in-out infinite alternate;
        }
        
        @keyframes containerGlow {
            0% { box-shadow: 0 0 30px rgba(255, 107, 107, 0.3), 0 0 60px rgba(252, 202, 87, 0.2), 10px 10px 0px rgba(0,0,0,0.2); }
            100% { box-shadow: 0 0 40px rgba(72, 219, 251, 0.4), 0 0 80px rgba(255, 159, 243, 0.3), 10px 10px 0px rgba(0,0,0,0.2); }
        }

        /* === HEADER === */
        .header { position: relative; width: 100%; margin-bottom: 30px; z-index: 2; }
        .header-bg {
            position: absolute; width: 100%; height: 65px; bottom: 0; left: 0;
            background: linear-gradient(169.13deg, #ff6b6b 0%, #feca57 50%, #48dbfb 100%);
            border: 4px solid transparent;
            background-image: linear-gradient(169.13deg, #ff6b6b 0%, #feca57 50%, #48dbfb 100%),
                              linear-gradient(45deg, #ff9ff3, #feca57, #48dbfb);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            border-radius: 12px 12px 24px 24px;
            box-sizing: border-box; z-index: 1; box-shadow: var(--shadow-hard);
            animation: headerPulse 2s ease-in-out infinite;
        }
        
        @keyframes headerPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        .header-tabs { position: relative; width: 100%; display: flex; justify-content: space-between; gap: 12px; z-index: 3; }
        .tab-btn {
            position: relative; flex: 1; height: 70px; border-radius: 16px; border: 4px solid transparent;
            color: #FFFFFF; font-family: 'Rowdies', cursive; font-weight: 700; font-size: 1.2rem; cursor: pointer;
            display: flex; align-items: flex-end; justify-content: center; padding-bottom: 12px; box-sizing: border-box;
            box-shadow: var(--shadow-hard); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-shadow: 2px 2px 0px rgba(0,0,0,0.5); background: #888; filter: brightness(0.7);
            overflow: hidden;
        }
        
        .tab-btn::before {
            content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s;
            z-index: -1;
        }
        
        .tab-btn:hover::before {
            transform: translateX(100%);
        }
        .tab-btn.active-main { 
            filter: brightness(1.2); 
            transform: translateY(-5px) scale(1.05); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.4), 0 0 20px rgba(255,255,255,0.3);
            animation: tabGlow 2s ease-in-out infinite;
        }
        
        @keyframes tabGlow {
            0%, 100% { box-shadow: 0 10px 25px rgba(0,0,0,0.4), 0 0 20px rgba(255,255,255,0.3); }
            50% { box-shadow: 0 10px 25px rgba(0,0,0,0.4), 0 0 30px rgba(255,107,107,0.5); }
        }

        .title {
            width: 100%; text-align: center; font-size: 2.2rem; line-height: 100%; letter-spacing: -0.05em; color: #fff;
            -webkit-text-stroke: 2px var(--outline-color); margin-bottom: 25px; paint-order: stroke fill; text-shadow: 4px 4px 0px rgba(0,0,0,0.3);
        }

        /* === FORM CARD === */
        .form-card {
            position: relative; width: 100%; background: #FDEFC7; border: 5px solid var(--outline-color);
            border-radius: var(--card-radius); box-sizing: border-box; padding: 45px 35px 35px 35px; box-shadow: 8px 8px 0px rgba(0,0,0,0.2);
        }
        .corner { position: absolute; width: 110px; height: auto; z-index: 5; pointer-events: none; filter: drop-shadow(3px 3px 0px rgba(0,0,0,0.2)); }
        .corner-tl { top: -18px; left: -18px; transform: rotate(0deg); }
        .corner-tr { top: -18px; right: -18px; transform: rotate(90deg); }
        .corner-br { bottom: -18px; right: -18px; transform: rotate(180deg); }
        .corner-bl { bottom: -18px; left: -18px; transform: rotate(-90deg); }

        /* === GENERAL UI ELEMENTS === */
        .form-group { margin-bottom: 25px; }
        .label-bold { font-weight: 700; font-size: 1.1rem; color: #2a1b0e; display: block; margin-bottom: 8px; }
        .input-box {
            width: 100%; height: 55px; background: #fff; border: 3px solid var(--outline-color); border-radius: var(--input-radius);
            box-sizing: border-box; font-family: 'Rowdies', cursive; font-weight: 400; font-size: 1.3rem; color: #2a1b0e;
            padding: 0 15px; outline: none; box-shadow: inset 2px 2px 0px rgba(0,0,0,0.1);
        }
        .input-box:focus { border-color: #04E8FA; box-shadow: inset 2px 2px 0px rgba(0,0,0,0.1), 0 0 10px #04E8FA; }
        .select-container { position: relative; width: 100%; }
        .select-container::after { content: '▼'; position: absolute; right: 15px; top: 50%; transform: translateY(-50%); font-size: 1.2rem; color: var(--outline-color); pointer-events: none; }
        .select-box {
            width: 100%; height: 55px; background: #fff; border: 3px solid var(--outline-color); border-radius: var(--input-radius);
            box-sizing: border-box; font-family: 'Rowdies', cursive; font-weight: 400; font-size: 1.2rem; color: #2a1b0e;
            padding: 0 15px; outline: none; appearance: none; -webkit-appearance: none; cursor: pointer; box-shadow: inset 2px 2px 0px rgba(0,0,0,0.1);
        }

        /* =========================================
           KHUSUS: WITHDRAW PAGE
           ========================================= */
        .limit-box {
            background: #FFF3CD; border: 3px solid #FFEE58; border-radius: var(--input-radius);
            padding: 15px; margin-bottom: 25px; box-shadow: 4px 4px 0px rgba(0,0,0,0.15);
            text-align: center; font-size: 1.1rem; color: #856404;
        }
        .limit-box strong { color: #d62828; font-size: 1.3rem; }

        .wallet-box {
            background: #fff; border: 3px solid var(--outline-color); border-radius: 15px; padding: 20px;
            margin-bottom: 25px; box-shadow: 4px 4px 0px rgba(0,0,0,0.15); display: flex; flex-direction: column; gap: 10px;
        }
        .wallet-label-row { display: flex; justify-content: space-between; align-items: center; }
        .wallet-label { font-weight: 700; font-size: 0.9rem; color: var(--outline-color); text-transform: uppercase; }
        
        .info-display {
            background: #f8f9fa; border: 2px solid #ced4da; border-radius: 8px;
            padding: 10px 15px; font-weight: 400; font-size: 1.1rem; color: #495057;
        }

        .input-group-transfer { display: flex; gap: 15px; align-items: stretch; }
        .input-group-transfer .input-box { flex: 1; }
        .all-in-btn {
            width: 120px; background: linear-gradient(180deg, #ffee55 0%, #f7b30b 100%); border: 3px solid var(--outline-color);
            border-radius: var(--input-radius); color: var(--outline-color); font-family: 'Rowdies', cursive; font-weight: 700;
            font-size: 1.2rem; cursor: pointer; box-shadow: 4px 4px 0px rgba(0,0,0,0.2); transition: transform 0.1s;
        }
        .all-in-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px rgba(0,0,0,0.2); }

        .error-msg {
            color: #d62828; font-size: 0.9rem; font-weight: 400; margin-top: 8px;
            display: flex; align-items: center; gap: 5px;
        }

        .summary-text {
            text-align: center; font-size: 1.2rem; color: var(--outline-color); margin: 20px 0;
            font-weight: 700;
        }
        .summary-amount { color: #1dbf2f; font-size: 1.4rem; }

        .presets { display: flex; gap: 12px; margin-top: 15px; }
        .preset-btn {
            position: relative; flex: 1; height: 50px; background: linear-gradient(180deg, #e0f7fa 0%, #81d4fa 100%);
            border: 3px solid var(--outline-color); border-radius: var(--btn-radius); color: #2a1b0e; font-family: 'Rowdies', cursive;
            font-weight: 700; font-size: 1.2rem; cursor: pointer; box-shadow: 4px 4px 0px rgba(0,0,0,0.2); transition: transform 0.1s, box-shadow 0.1s;
        }
        .preset-btn.active { background: linear-gradient(180deg, #23E0F5 0%, #1BB0EF 100%); color: #fff; text-shadow: 2px 2px 0px rgba(0,0,0,0.4); transform: scale(1.05); box-shadow: 4px 4px 0px rgba(0,0,0,0.3); }

        .action-buttons { display: flex; gap: 20px; margin-top: 30px; }
        .action-btn {
            flex: 1; height: 65px; border: 4px solid var(--outline-color); border-radius: 35px; font-family: 'Rowdies', cursive;
            font-weight: 700; font-size: 1.4rem; cursor: pointer; box-shadow: 6px 6px 0px rgba(0,0,0,0.3); transition: transform 0.1s, box-shadow 0.1s;
        }
        .action-btn:active { transform: translate(3px, 3px); box-shadow: 2px 2px 0px rgba(0,0,0,0.3); }
        .reset-btn { background: linear-gradient(180deg, #ff8a8a 0%, #d62828 100%); color: #fff; text-shadow: 2px 2px 0px rgba(0,0,0,0.3); }
        .withdraw-btn { background: linear-gradient(180deg, #b8ff6b 0%, #38d417 100%); color: var(--outline-color); text-shadow: 1px 1px 0px rgba(255,255,255,0.4); }

        /* =========================================
           RESPONSIVE
           ========================================= */
        @media (max-width: 768px) {
            .deposit-container { padding: 20px; }
            .tab-btn { height: 60px; font-size: 0.9rem; }
            .header-bg { height: 55px; }
            .title { font-size: 1.8rem; }
            .input-box, .select-box { height: 50px; font-size: 1rem; }
            .preset-btn, .all-in-btn { height: 45px; font-size: 0.9rem; }
            .action-btn { height: 55px; font-size: 1.1rem; }
            .corner { width: 90px; }
        }

        @media (max-width: 480px) {
            .deposit-container { padding: 15px; border-radius: 20px; border-width: 3px; }
            .header-tabs { flex-wrap: wrap; gap: 8px; }
            .tab-btn { flex-basis: calc(50% - 8px); height: 55px; font-size: 1rem; }
            .tab-btn.active-main { transform: translateY(-3px); }
            .header-bg { height: 115px; bottom: -60px; z-index: 0; }
            .title { font-size: 1.6rem; -webkit-text-stroke: 1px var(--outline-color); }
            .form-card { padding: 45px 15px 20px 15px; }
            .corner { width: 75px; }
            .corner-tl { top: -12px; left: -12px; } .corner-tr { top: -12px; right: -12px; }
            .corner-br { bottom: -12px; right: -12px; } .corner-bl { bottom: -12px; left: -12px; }
            .input-group-transfer { flex-direction: column; }
            .all-in-btn { width: 100%; }
            .action-buttons { flex-direction: column-reverse; }
            .presets { flex-wrap: wrap; }
            .preset-btn { flex-basis: calc(50% - 12px); }
        }
    </style>
</head>
<body>

    <svg width="0" height="0" style="position: absolute;">
        <defs>
            <linearGradient id="cFill" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox"><stop offset="0" stop-color="#FFB7BC"/><stop offset="1" stop-color="#E8455A"/></linearGradient>
            <linearGradient id="cStroke" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox"><stop offset="0" stop-color="#2a1b0e"/><stop offset="1" stop-color="#4a0e1c"/></linearGradient>
        </defs>
    </svg>

    <div class="deposit-container">
        <div class="header">
            <div class="header-bg"></div>
            <div class="header-tabs">
                <button class="tab-btn tab-blue">DEPOSIT</button>
                <button class="tab-btn tab-red active-main">WITHDRAW</button>
            </div>
        </div>
        <div class="title">POKÉMON GACHA</div>

        <div class="form-card">
            <!-- SVG Corners (PATH SUDAH DIPERBAIKI) -->
            <div class="corner corner-tl"><svg viewBox="0 0 390 401" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M363.792 0.5C364.513 0.500053 365.173 0.652718 365.775 0.999023C367.785 2.15445 372.501 5.08197 377.197 9.56348C381.897 14.0479 386.546 20.0587 388.479 27.3779C390.405 34.6761 389.646 43.3312 383.433 53.1602C377.208 63.0059 365.505 74.0345 345.534 86.0176C323.855 99.0254 311.689 112.78 304.628 127.019C297.573 141.246 295.638 155.915 294.351 170.691C291.775 200.255 291.775 230.303 259.015 258.969C226.211 287.672 197.567 287.658 170.92 292.471C157.594 294.878 144.774 298.497 132.272 307.565C119.774 316.631 107.636 331.112 95.6055 355.172C84.4276 377.527 73.286 389.902 62.8203 395.794C52.3826 401.67 42.5655 401.127 33.9248 397.523C25.2613 393.91 17.7749 387.216 12.0791 380.79C6.38801 374.37 2.51373 368.252 1.06641 365.839C0.680811 365.196 0.500033 364.477 0.5 363.708V110.001C0.500054 49.526 49.525 0.501171 110 0.500977L363.792 0.5Z" fill="url(#cFill)" stroke="url(#cStroke)" stroke-width="5"/></svg></div>
            <div class="corner corner-tr"><svg viewBox="0 0 390 401" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M363.792 0.5C364.513 0.500053 365.173 0.652718 365.775 0.999023C367.785 2.15445 372.501 5.08197 377.197 9.56348C381.897 14.0479 386.546 20.0587 388.479 27.3779C390.405 34.6761 389.646 43.3312 383.433 53.1602C377.208 63.0059 365.505 74.0345 345.534 86.0176C323.855 99.0254 311.689 112.78 304.628 127.019C297.573 141.246 295.638 155.915 294.351 170.691C291.775 200.255 291.775 230.303 259.015 258.969C226.211 287.672 197.567 287.658 170.92 292.471C157.594 294.878 144.774 298.497 132.272 307.565C119.774 316.631 107.636 331.112 95.6055 355.172C84.4276 377.527 73.286 389.902 62.8203 395.794C52.3826 401.67 42.5655 401.127 33.9248 397.523C25.2613 393.91 17.7749 387.216 12.0791 380.79C6.38801 374.37 2.51373 368.252 1.06641 365.839C0.680811 365.196 0.500033 364.477 0.5 363.708V110.001C0.500054 49.526 49.525 0.501171 110 0.500977L363.792 0.5Z" fill="url(#cFill)" stroke="url(#cStroke)" stroke-width="5"/></svg></div>
            <div class="corner corner-br"><svg viewBox="0 0 390 401" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M363.792 0.5C364.513 0.500053 365.173 0.652718 365.775 0.999023C367.785 2.15445 372.501 5.08197 377.197 9.56348C381.897 14.0479 386.546 20.0587 388.479 27.3779C390.405 34.6761 389.646 43.3312 383.433 53.1602C377.208 63.0059 365.505 74.0345 345.534 86.0176C323.855 99.0254 311.689 112.78 304.628 127.019C297.573 141.246 295.638 155.915 294.351 170.691C291.775 200.255 291.775 230.303 259.015 258.969C226.211 287.672 197.567 287.658 170.92 292.471C157.594 294.878 144.774 298.497 132.272 307.565C119.774 316.631 107.636 331.112 95.6055 355.172C84.4276 377.527 73.286 389.902 62.8203 395.794C52.3826 401.67 42.5655 401.127 33.9248 397.523C25.2613 393.91 17.7749 387.216 12.0791 380.79C6.38801 374.37 2.51373 368.252 1.06641 365.839C0.680811 365.196 0.500033 364.477 0.5 363.708V110.001C0.500054 49.526 49.525 0.501171 110 0.500977L363.792 0.5Z" fill="url(#cFill)" stroke="url(#cStroke)" stroke-width="5"/></svg></div>
            <div class="corner corner-bl"><svg viewBox="0 0 390 401" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M363.792 0.5C364.513 0.500053 365.173 0.652718 365.775 0.999023C367.785 2.15445 372.501 5.08197 377.197 9.56348C381.897 14.0479 386.546 20.0587 388.479 27.3779C390.405 34.6761 389.646 43.3312 383.433 53.1602C377.208 63.0059 365.505 74.0345 345.534 86.0176C323.855 99.0254 311.689 112.78 304.628 127.019C297.573 141.246 295.638 155.915 294.351 170.691C291.775 200.255 291.775 230.303 259.015 258.969C226.211 287.672 197.567 287.658 170.92 292.471C157.594 294.878 144.774 298.497 132.272 307.565C119.774 316.631 107.636 331.112 95.6055 355.172C84.4276 377.527 73.286 389.902 62.8203 395.794C52.3826 401.67 42.5655 401.127 33.9248 397.523C25.2613 393.91 17.7749 387.216 12.0791 380.79C6.38801 374.37 2.51373 368.252 1.06641 365.839C0.680811 365.196 0.500033 364.477 0.5 363.708V110.001C0.500054 49.526 49.525 0.501171 110 0.500977L363.792 0.5Z" fill="url(#cFill)" stroke="url(#cStroke)" stroke-width="5"/></svg></div>

            <!-- Batas Harian -->
            <div class="limit-box">
                Batas penarikan harian anda adalah: <strong>50000 K</strong>
            </div>

            <!-- Info Akun -->
            <div class="wallet-box">
                <div class="wallet-label-row">
                    <span class="wallet-label">Akun Penarikan</span>
                </div>
                <div class="select-container">
                    <select class="select-box" id="accountSelect">
                        <option>OVO - 089636614845</option>
                        <option>DANA - 081234567890</option>
                    </select>
                </div>
                <div class="info-display">OVO - 089636614845</div>
                <div class="info-display" style="font-weight: 700;">Andy Handoko</div>
                <div class="info-display">089636614845</div>
            </div>

            <!-- Form Jumlah -->
            <div class="form-group">
                <span class="label-bold">Jumlah penarikan minimal IDR 100K ( 1 = 1000 )</span>
                <div class="input-group-transfer">
                    <input type="number" class="input-box" id="withdrawInput" placeholder="Masukkan jumlah penarikan" min="0">
                    <button class="all-in-btn" id="allInBtn">ALL IN</button>
                </div>
                <div class="error-msg">
                    <span>⚠️</span> Jumlah penarikan harus lebih besar dari minimal jumlah penarikan
                </div>
            </div>

            <!-- Summary -->
            <div class="summary-text">
                Anda akan melakukan penarikan <span class="summary-amount" id="summaryAmount">0</span>
            </div>

            <!-- Presets -->
            <div class="presets">
                <button class="preset-btn" data-amount="50000">50</button>
                <button class="preset-btn" data-amount="100000">100</button>
                <button class="preset-btn" data-amount="200000">200</button>
                <button class="preset-btn" data-amount="500000">500</button>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button class="action-btn reset-btn">RESET</button>
                <button class="action-btn withdraw-btn">WITHDRAW</button>
            </div>

        </div>
    </div>

    <script>
        const withdrawInput = document.getElementById('withdrawInput');
        const summaryAmount = document.getElementById('summaryAmount');
        const presetBtns = document.querySelectorAll('.preset-btn');
        const resetBtn = document.querySelector('.reset-btn');
        const allInBtn = document.getElementById('allInBtn');

        // Fungsi format angka agar mudah dibaca (misal 500000 jadi 500.000)
        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        function updateSummary() {
            const val = withdrawInput.value || 0;
            summaryAmount.textContent = formatNumber(Number(val));
        }

        withdrawInput.addEventListener('input', function() {
            presetBtns.forEach(b => b.classList.remove('active'));
            updateSummary();
        });

        presetBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                presetBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                withdrawInput.value = this.getAttribute('data-amount');
                updateSummary();
            });
        });

        allInBtn.addEventListener('click', function() {
            presetBtns.forEach(b => b.classList.remove('active'));
            withdrawInput.value = 50000000; // 50000 K
            updateSummary();
        });

        resetBtn.addEventListener('click', function() {
            withdrawInput.value = '';
            presetBtns.forEach(b => b.classList.remove('active'));
            updateSummary();
        });
    </script>
</body>
</html>
