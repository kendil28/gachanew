<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legendary Board - GachaKeren</title>
<link href="https://fonts.googleapis.com/css2?family=Rowdies:wght@300;400;700&display=swap" rel="stylesheet">
<style>
        :root {
            --btn-radius: 12px;
            --card-radius: 20px;
            --input-radius: 10px;
            --glossy-size: 14px;
            --outline-color: #2a1b0e;
            --shadow-hard: 5px 5px 0px rgba(0, 0, 0, 0.35);
        }

        body {
            background: transparent;
            display: flex; justify-content: center; align-items: flex-start; min-height: 100vh;
            margin: 0; font-family: 'Rowdies', cursive; padding: 20px; box-sizing: border-box;
            padding-top: 60px;
        }

        .deposit-container {
            position: relative; width: 100%; max-width: 1300px;
            background: rgba(255, 255, 255, 0.15);
            border: 4px solid transparent;
            background-image: linear-gradient(rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.15)),
                              linear-gradient(45deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            border-radius: 25px; padding: 34px 15px; box-sizing: border-box;
            backdrop-filter: blur(15px); 
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.3),
                        0 0 60px rgba(252, 202, 87, 0.2),
                        10px 10px 0px rgba(0,0,0,0.2);
            animation: containerGlow 3s ease-in-out infinite alternate;
        }
        
        @keyframes containerGlow {
            0% { box-shadow: 0 0 30px rgba(255, 107, 107, 0.3), 0 0 60px rgba(252, 202, 87, 0.2), 10px 10px 0px rgba(0,0,0,0.2); }
            100% { box-shadow: 0 0 40px rgba(72, 219, 251, 0.4), 0 0 80px rgba(255, 159, 243, 0.3), 10px 10px 0px rgba(0,0,0,0.2); }
        }

        /* === HEADER === */
        .header { position: relative; width: 100%; margin: -57px 0 41px 0; z-index: 2; }
        .header-bg {
            position: absolute; width: 100%; height: 65px; bottom: 0; left: 0;
            background: linear-gradient(169.13deg, #ff6b6b 0%, #feca57 50%, #48dbfb 100%);
            border: 4px solid transparent;
            background-image: linear-gradient(169.13deg, #ff6b6b 0%, #feca57 50%, #48dbfb 100%),
                              linear-gradient(45deg, #ff9ff3, #feca57, #48dbfb);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            border-radius: 12px 12px 24px 24px;
            box-sizing: border-box; z-index: 1; box-shadow: var(--shadow-hard);
            animation: headerPulse 2s ease-in-out infinite;
        }
        
        @keyframes headerPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        .header-tabs { position: relative; width: 100%; display: flex; justify-content: space-between; gap: 12px; z-index: 3; }
        .tab-btn {
            position: relative; flex: 1; height: 70px; border-radius: 16px; border: 4px solid transparent;
            color: #FFFFFF; font-family: 'Rowdies', cursive; font-weight: 700; font-size: 1.2rem; cursor: pointer;
            display: flex; align-items: flex-end; justify-content: center; padding-bottom: 12px; box-sizing: border-box;
            box-shadow: var(--shadow-hard); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-shadow: 2px 2px 0px rgba(0,0,0,0.5); background: #888; filter: brightness(0.7);
            overflow: hidden;
        }
        
        .tab-btn::before {
            content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s;
            z-index: -1;
        }
        
        .tab-btn:hover::before {
            transform: translateX(100%);
        }
        .tab-btn.active-main { 
            filter: brightness(1.2); 
            transform: translateY(-5px) scale(1.05); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.4), 0 0 20px rgba(255,255,255,0.3);
            animation: tabGlow 2s ease-in-out infinite;
        }
        
        @keyframes tabGlow {
            0%, 100% { box-shadow: 0 10px 25px rgba(0,0,0,0.4), 0 0 20px rgba(255,255,255,0.3); }
            50% { box-shadow: 0 10px 25px rgba(0,0,0,0.4), 0 0 30px rgba(255,255,255,0.5); }
        }
        .tab-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px rgba(0,0,0,0.35); }
        .tab-btn::before {
            content: ''; position: absolute; width: var(--glossy-size); height: calc(var(--glossy-size) * 1.8); top: 8px; left: 10px;
            background: linear-gradient(143.13deg, #FFFFFF 20%, rgba(255, 255, 255, 0) 53.65%); border-radius: 50%;
        }
        .tab-gold { 
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 50%, #FF8C00 100%);
            border-color: transparent;
        }

        .title {
            width: 100%; text-align: center; font-size: 2.2rem; line-height: 100%; letter-spacing: -0.05em; color: #fff;
            -webkit-text-stroke: 2px var(--outline-color); margin-bottom: 25px; paint-order: stroke fill; text-shadow: 4px 4px 0px rgba(0,0,0,0.3);
        }

        /* === LEGENDARY CONTENT === */
        .stats-container {
            display: flex; justify-content: space-around; margin-bottom: 25px; gap: 15px;
        }
        .stat-box {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid transparent;
            background-image: linear-gradient(rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.1)),
                              linear-gradient(45deg, #ff6b6b, #feca57, #48dbfb);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            border-radius: 12px; padding: 12px; text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 3px 12px rgba(0,0,0,0.2);
            flex: 1;
        }
        .stat-number {
            font-size: 1.8rem; font-weight: 700; color: #FFD700; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 3px;
        }
        .stat-label {
            font-size: 0.75rem; color: rgba(255,255,255,0.8); text-transform: uppercase;
        }

        .card-section {
            background: rgba(255, 255, 255, 0.1);
            border: 5px solid var(--outline-color);
            border-radius: var(--card-radius); padding: 25px; margin-bottom: 20px;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.2);
            position: relative;
        }

        .card-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
            padding-bottom: 15px; border-bottom: 2px solid rgba(255,255,255,0.2);
        }
        .card-title {
            font-size: 1.3rem; font-weight: 700; color: #FFD700; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .card-stats {
            display: flex; gap: 15px; flex-wrap: wrap;
        }
        .card-stat {
            background: rgba(255, 215, 0, 0.2); border: 2px solid #FFD700; border-radius: 10px;
            padding: 8px 12px; font-size: 0.85rem; color: #FFD700;
        }

        .owners-section {
            background: rgba(0, 0, 0, 0.3); border-radius: 10px; padding: 15px; margin-top: 15px;
        }
        .owners-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;
            color: #FFD700; font-weight: 700;
        }
        .owner-list {
            display: grid; gap: 10px;
        }
        .owner-item {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(255,255,255,0.2);
            border-radius: 8px; padding: 10px 15px;
            transition: all 0.3s;
        }
        .owner-item:hover {
            background: rgba(255, 255, 255, 0.1); transform: translateY(-2px);
        }
        .owner-name {
            color: #fff; font-weight: 600;
        }
        .owner-date {
            color: rgba(255,255,255,0.7); font-size: 0.9rem;
        }
        .owner-number {
            background: linear-gradient(135deg, #ff6b6b, #feca57); color: #fff;
            width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.9rem;
        }

/* ===== HEADER ===== */
.lb-header{
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px 20px 8px;
  position:relative;
}
.lb-title{
  font-family:'Cinzel',serif;
  font-size:clamp(1.4rem,4vw,2rem);
  font-weight:900;
  color:#FFD700;
  text-shadow:0 0 20px rgba(255,215,0,.6),0 2px 8px rgba(0,0,0,.8);
  letter-spacing:2px;
  text-align:center;
}
.lb-timer{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  margin-top:6px;
  font-size:13px;
  color:rgba(255,255,255,.65);
}
.lb-timer i{color:#FFD700;}
.lb-timer span{color:#fff;font-weight:700;}

/* ===== HINT TEXT ===== */
.lb-hint{
  font-size:12px;
  color:rgba(255,255,255,.55);
  line-height:1.6;
  text-align: center;
  padding: 8px 20px 14px;
  padding-left: 852px;
  border-bottom: 1px solid rgba(255,255,255,.08);
  margin-bottom: 4px;
}
.lb-hint::before{content:'? ';color:#FFD700;}

/* ===== LAYOUT ===== */
.lb-layout{
  display:flex;
  flex-direction:column;
  gap:0;
  min-height:calc(100vh - 160px);
}

/* ===== HORIZONTAL TABS � persis seperti Koleksi Saya ===== */
@property --lb-angle {
  syntax: '<angle>';
  initial-value: 0deg;
  inherits: false;
}
@keyframes lbSnake { to { --lb-angle: 360deg; } }
@keyframes lbFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
@keyframes lbShake {
  0%  {transform:rotate(0deg) scale(1)}
  15% {transform:rotate(-12deg) scale(1.1)}
  30% {transform:rotate(10deg) scale(1.15)}
  45% {transform:rotate(-8deg) scale(1.1)}
  60% {transform:rotate(6deg) scale(1.05)}
  75% {transform:rotate(-4deg)}
  90% {transform:rotate(2deg)}
  100%{transform:rotate(0deg) scale(1)}
}
@keyframes lbRipple {
  0%  {transform:translateX(-50%) scale(0.5);opacity:0.7}
  100%{transform:translateX(-50%) scale(4);opacity:0}
}
@keyframes lbStarBlink {
  0%,100%{opacity:0;transform:scale(0.4) rotate(0deg)}
  30%    {opacity:1;transform:scale(1.4) rotate(20deg)}
  60%    {opacity:0.5;transform:scale(0.8) rotate(-15deg)}
  80%    {opacity:0;transform:scale(0.3) rotate(35deg)}
}

.lb-tabs {
  display: flex; gap: 16px;
  background: transparent;
  border-radius: 0; padding: 0;
  box-shadow: none;
  flex-wrap: wrap;
  margin-top: 44px;
  position: relative;
  overflow: visible;
  border: none;
}

.sidebar-item {
  flex: 1; min-width: 60px;
  background: none !important;
  border: none !important;
  box-shadow: none !important;
  outline: none;
  font-family: 'Poppins', sans-serif;
  font-size: 10px; font-weight: 800;
  color: rgba(255,255,255,0.75);
  cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  padding: 0;
  position: relative;
}

/* Icon wrap */
.sidebar-item .icon-wrap {
  position: relative;
  width: 72px; height: 72px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  border-radius: 20px;
  overflow: visible;
}

/* Icon img */
.sidebar-item .icon-wrap img {
  width: 68px; height: 68px; object-fit: contain;
  position: relative; z-index: 2;
  border-radius: 18px;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
  animation: lbFloat 3s ease-in-out infinite;
}

/* Snake border mengelilingi icon � SELALU JALAN */
.sidebar-item .icon-wrap::before {
  content: '';
  position: absolute; inset: -3px;
  border-radius: 18px;
  background: conic-gradient(
    from var(--lb-angle, 0deg),
    transparent 0deg, transparent 50deg,
    rgba(255,255,255,0.95) 80deg,
    rgba(200,120,255,0.9) 110deg,
    rgba(255,210,50,0.95) 140deg,
    rgba(100,210,255,0.85) 160deg,
    transparent 180deg, transparent 360deg
  );
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  padding: 3px;
  animation: lbSnake 2.5s linear infinite;
  z-index: 1;
  pointer-events: none;
}

/* Ripple on hover */
.sidebar-item .icon-wrap::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%) scale(0);
  width: 52px; height: 52px;
  border-radius: 50%;
  background: rgba(255,255,255,0.5);
  pointer-events: none; opacity: 0; z-index: 1;
}
@keyframes lbRippleWrap {
  0%  {transform:translate(-50%,-50%) scale(0.5);opacity:0.7}
  100%{transform:translate(-50%,-50%) scale(4);opacity:0}
}

/* Label */
.sidebar-label {
  font-size: 10px; font-weight: 800;
  color: rgba(255,255,255,0.8);
  text-align: center; line-height: 1.2;
}

/* Hover */
.sidebar-item:hover .icon-wrap img {
  animation: lbShake 0.5s ease forwards;
  filter: drop-shadow(0 0 14px rgba(255,255,255,0.95));
}
.sidebar-item:hover .icon-wrap::before { animation: lbSnake 1.2s linear infinite; }
.sidebar-item:hover .icon-wrap::after  { animation: lbRippleWrap 0.6s ease-out forwards; }
.sidebar-item:hover .sidebar-label { color: #fff; }

/* Active */
.sidebar-item.active .icon-wrap img {
  transform: scale(1.15);
  filter: drop-shadow(0 0 16px rgba(255,255,255,0.95)) drop-shadow(0 0 8px rgba(255,200,50,0.8));
  animation: lbFloat 2s ease-in-out infinite;
}
.sidebar-item.active .icon-wrap::before { animation: lbSnake 1s linear infinite; }
.sidebar-item.active .sidebar-label { color: #FFD700; text-shadow: 0 0 8px rgba(255,215,0,0.6); }

/* Bintang blink */
.lb-star {
  position: absolute; pointer-events: none; z-index: 3;
  animation: lbStarBlink var(--dur,2s) ease-in-out var(--delay,0s) infinite;
  opacity: 0;
}

.sidebar-badge {
  position: absolute; top: 6px; right: 6px;
  background: #e53935; color: #fff;
  font-size: 8px; font-weight: 700;
  padding: 1px 4px; border-radius: 4px;
  letter-spacing: .5px; z-index: 3;
}

@media(min-width:768px) {
  .sidebar-item .icon-wrap { width: 80px; height: 80px; border-radius: 22px; }
  .sidebar-item .icon-wrap::before { border-radius: 26px; }
  .sidebar-item .icon-wrap img { width: 76px; height: 76px; border-radius: 20px; }
  .sidebar-label { font-size: 11px; }
  .lb-tabs { margin-top: 48px; gap: 18px; }
}
@media(min-width:1024px) {
  .sidebar-item .icon-wrap { width: 88px; height: 88px; border-radius: 24px; }
  .sidebar-item .icon-wrap::before { border-radius: 28px; }
  .sidebar-item .icon-wrap img { width: 84px; height: 84px; border-radius: 22px; }
  .sidebar-label { font-size: 12px; }
  .lb-tabs { margin-top: 52px; gap: 20px; }
}

/* ===== MAIN CONTENT ===== */
.lb-main{
  flex:1;
  padding:16px 16px 20px;
  overflow-x:hidden;
  overflow-y:auto;
}
.lb-main::-webkit-scrollbar{
  width:8px;
  opacity:0;
}
.lb-main::-webkit-scrollbar-track{
  background:transparent;
}
.lb-main::-webkit-scrollbar-thumb{
  background:rgba(255,255,255,0.3);
  border-radius:4px;
  opacity:0;
}

/* ===== CARDS GRID ===== */
.cards-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:24px;
  max-width:1200px;
  margin:0 auto;
}

/* ===== CARD ITEM ===== */
.lb-card{
  border-radius:12px;
  overflow:hidden;
  position:relative;
  cursor:pointer;
  transition:transform .25s,box-shadow .25s;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  border:2px solid rgba(255,255,255,.2);
}
.lb-card:hover{
  transform:translateY(-4px) scale(1.02);
  box-shadow:0 10px 24px rgba(0,0,0,.6);
}
.lb-card.legendary{border-color:rgba(255,215,0,.5);}
.lb-card.legendary:hover{box-shadow:0 10px 24px rgba(255,215,0,.3);}
.lb-card.mythic{border-color:rgba(219,39,119,.5);}
.lb-card.mythic:hover{box-shadow:0 10px 24px rgba(219,39,119,.3);}
.lb-card.special{border-color:rgba(96,165,250,.5);}
.lb-card.special:hover{box-shadow:0 10px 24px rgba(96,165,250,.3);}

/* Card image */
.lb-card-img{
  width:100%;
  aspect-ratio:3/4;
  object-fit:contain;
  display:block;
}

/* Special badge */
.lb-card-badge{
  position:absolute;
  top:5px;left:5px;
  font-size:8px;font-weight:700;
  padding:2px 6px;border-radius:4px;
  letter-spacing:.5px;text-transform:uppercase;
}
.badge-special{background:#3b82f6;color:#fff;}
.badge-new{background:#e53935;color:#fff;}
.badge-limited{background:linear-gradient(135deg,#FFD700,#ff9800);color:#000;}

/* Card info overlay */
.lb-card-info{
  padding:8px 10px 11px;
  background:linear-gradient(180deg,rgba(0,0,0,.0) 0%,rgba(0,0,0,.88) 100%);
}
.lb-card-name{
  font-size:12px;font-weight:700;
  color:#4fc3f7;
  text-align:center;
  text-shadow:0 1px 4px rgba(0,0,0,.8);
  margin-bottom:2px;
}
.lb-card-sub{
  font-size:10px;color:rgba(255,255,255,.55);
  text-align:center;margin-bottom:8px;
}

/* Status / Button */
.lb-card-status{
  text-align:center;
  font-size:10px;color:rgba(255,255,255,.45);
  margin-bottom:6px;
  line-height:1.4;
}
.lb-card-owned{
  text-align:center;
  font-size:12px;font-weight:700;
  color:rgba(255,255,255,.45);
  padding:5px 0;
  letter-spacing:.5px;
}
.lb-card-btn{
  display:block;width:100%;
  padding:7px 6px;
  background:linear-gradient(135deg,#c8a84b,#FFD700,#c8a84b);
  border:none;border-radius:6px;
  color:#1a1000;font-family:'Poppins',sans-serif;
  font-size:11px;font-weight:700;
  cursor:pointer;
  text-align:center;
  letter-spacing:.3px;
  transition:transform .15s,box-shadow .15s;
  box-shadow:0 2px 8px rgba(255,215,0,.3);
  line-height:1.4;
}
.lb-card-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 4px 12px rgba(255,215,0,.5);
}
.lb-card-btn:active{transform:scale(.97);}

/* Holo shimmer */
.lb-card.legendary::after,
.lb-card.mythic::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,transparent 30%,rgba(255,255,255,.06) 50%,transparent 70%);
  background-size:200% 200%;
  animation:holo 4s ease-in-out infinite;
  pointer-events:none;
}
@keyframes holo{0%,100%{background-position:0% 0%}50%{background-position:100% 100%}}

@keyframes popIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
/* ===== RESPONSIVE ===== */

  .deposit-container {
    max-width: 95%;
    padding: 25px 15px;
  }
  .card-frame {
    width: 100% !important;
    height: auto !important;
    margin: 15px auto !important;
  }
  .card-frame svg {
    width: 100% !important;
    height: auto !important;
  }
}

    padding: 15px 8px 80px 8px;
  }

    margin-bottom: 15px;

  }
  
  .card-frame .card-image-frame img {

    height: 160px !important;
  }
  
  .card-frame .card-content-container {
    position: relative !important;

    top: 0 !important;

  }
  
  .card-frame .card-name-price-row {

}
.book-corner svg { width: 50px; height: 51px; display: block; }

/* TL � normal */
.book-corner.tl { top: 0; left: 0; }

/* TR � flip horizontal: geser ke kanan sebesar lebar corner */
.book-corner.tr {
  top: 0; right: 0;

}

/* BL � flip vertical */
.book-corner.bl {
  bottom: 0; left: 0;
  transform: scaleY(-1);
  transform-origin: 50% 50%;
}

.book-corner.br {

    .lgd-m-top { flex-direction: column; align-items: center; }
    .lgd-m-img { width: 100px; height: 140px; min-width: unset; }
}
.lgd-modal-box {
    background: linear-gradient(160deg, #1a1a2e, #0f3460);
    border: 2px solid rgba(255,215,0,0.4);
    border-radius: 20px; padding: 20px;
    max-width: 520px; width: 100%;
    position: relative; margin: auto; flex-shrink: 0;
    animation: lgdPop 0.3s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 30px rgba(255,215,0,0.15);
}
@keyframes lgdPop { from{transform:scale(0.8);opacity:0} to{transform:scale(1);opacity:1} }
.lgd-modal-close {
    position: absolute; top: 12px; right: 12px;
    background: rgba(255,255,255,0.1); border: none;
    color: #fff; width: 30px; height: 30px; border-radius: 50%;
    font-size: 15px; cursor: pointer; z-index: 2;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
}
.lgd-modal-close:hover { background: rgba(229,57,53,0.6); }

/* Modal content styles */
.lgd-m-top { display: flex; gap: 14px; margin-bottom: 14px; }
.lgd-m-img { width: 120px; min-width: 120px; height: 168px; object-fit: cover; border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
.lgd-m-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
.lgd-m-name { font-size: 1.1rem; font-weight: 700; color: #fff; line-height: 1.2; }
.lgd-m-price { font-size: 1rem; font-weight: 700; color: #FFD700; }
.lgd-m-badge {
    display: inline-block;
    background: linear-gradient(87deg, #FFCC00, #FF0000);
    border: 1px solid #FF0000; border-radius: 20px;
    padding: 2px 12px; font-size: 0.7rem; color: #fff;
    font-family: 'Rowdies', cursive; align-self: flex-start;
}
.lgd-m-stats { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
.lgd-m-stat {
    background: rgba(255,215,0,0.15); border: 1px solid rgba(255,215,0,0.3);
    border-radius: 8px; padding: 4px 10px;
    font-size: 0.65rem; color: #FFD700;
    font-family: 'Rowdies', cursive;
}
.lgd-m-divider { height: 1px; background: rgba(255,255,255,0.12); margin: 12px 0; }
.lgd-m-owners-label {
    font-size: 0.65rem; font-weight: 700; color: rgba(255,255,255,0.5);
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
}
.lgd-m-owners { display: flex; flex-wrap: wrap; gap: 6px; }
.lgd-m-owner-badge {
    display: inline-flex; align-items: center;
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px; padding: 3px 12px;
    font-size: 0.7rem; color: #fff;
    font-family: 'Rowdies', cursive;
}
</style>

<script>
var LEGENDARY_CARDS = [
    {
        img: '../assets/images/cards/ME03_EN_123.png',
        name: "Rosa's Encouragement",
        price: 'Rp 8.000.000',
        rarity: 'Legendary',
        terambil: '4/3', pemilik: 4, pull: 4, completion: '133.3%',
        owners: ['budi_legend 20/02','rizky_collector 25/02','rizky_collector 09/03','kendil_keren 09/03']
    },
    {
        img: '../assets/images/cards/ME03_EN_12.png',
        name: 'Decidueye Ex',
        price: 'Rp 6.000.000',
        rarity: 'Legendary',
        terambil: '3/3', pemilik: 3, pull: 3, completion: '100%',
        owners: ['budi_legend 22/02','rizky_collector 09/03','yayan_collector 09/03']
    },
    {
        img: '../assets/images/cards/ME03_EN_6.png',
        name: 'Serperior',
        price: 'Rp 5.500.000',
        rarity: 'Legendary',
        terambil: '3/3', pemilik: 3, pull: 3, completion: '100%',
        owners: ['budi_legend 22/02','rizky_collector 09/03','yayan_collector 09/03']
    },
    {
        img: '../assets/images/cards/ME03_EN_104.png',
        name: 'Luxray',
        price: 'Rp 7.000.000',
        rarity: 'Legendary',
        terambil: '5/3', pemilik: 5, pull: 5, completion: '166.7%',
        owners: ['budi_legend 22/02','rizky_collector 09/03','kendil_keren 09/03','yayan_collector 09/03','satria_pro 10/03']
    },
    {
        img: '../assets/images/cards/ME03_EN_111.png',
        name: 'Talonflame',
        price: 'Rp 4.500.000',
        rarity: 'Legendary',
        terambil: '2/3', pemilik: 2, pull: 2, completion: '66.7%',
        owners: ['budi_legend 22/02','rizky_collector 09/03']
    },
    {
        img: '../assets/images/cards/ME03_EN_14.png',
        name: 'Mega Zygarde EX',
        price: 'Rp 9.000.000',
        rarity: 'Legendary',
        terambil: '4/3', pemilik: 4, pull: 4, completion: '133.3%',
        owners: ['budi_legend 22/02','rizky_collector 09/03','kendil_keren 09/03','yayan_collector 09/03']
    },
    {
        img: '../assets/images/cards/ME03_EN_19.png',
        name: 'Oricorio',
        price: 'Rp 3.500.000',
        rarity: 'Legendary',
        terambil: '2/3', pemilik: 2, pull: 2, completion: '66.7%',
        owners: ['budi_legend 22/02','rizky_collector 09/03']
    },
    {
        img: '../assets/images/cards/ME03_EN_22.png',
        name: 'Bellibolt',
        price: 'Rp 5.000.000',
        rarity: 'Legendary',
        terambil: '3/3', pemilik: 3, pull: 3, completion: '100%',
        owners: ['budi_legend 22/02','rizky_collector 09/03','yayan_collector 09/03']
    }
];

var CARDS_PER_PAGE = 4;
var currentPage = 0;
var totalPages = Math.ceil(LEGENDARY_CARDS.length / CARDS_PER_PAGE);

function renderGrid() {
    var grid = document.getElementById('lgdGrid');
    var start = currentPage * CARDS_PER_PAGE;
    var end = Math.min(start + CARDS_PER_PAGE, LEGENDARY_CARDS.length);
    var html = '';
    for (var i = start; i < end; i++) {
        var c = LEGENDARY_CARDS[i];
        var statsHtml = '<span class="lgd-back-stat">' + c.terambil + ' Terambil</span>' +
            '<span class="lgd-back-stat">' + c.pemilik + ' Pemilik</span>' +
            '<span class="lgd-back-stat">' + c.pull + ' Pull</span>' +
            '<span class="lgd-back-stat">' + c.completion + '</span>';
        var ownersHtml = c.owners.map(function(o) {
            return '<span class="lgd-back-owner">' + o + '</span>';
        }).join('');
        html += '<div class="lgd-card" id="lgdcard-' + i + '" onclick="handleCardClick(' + i + ', this, event)">' +
            '<div class="lgd-card-inner">' +
                '<div class="lgd-card-front">' +
                    '<img src="' + c.img + '" alt="' + c.name + '" loading="lazy">' +
                '</div>' +
                '<div class="lgd-card-back">' +
                    '<button class="lgd-back-close" onclick="event.stopPropagation();flipBack(' + i + ')">&#x2715;</button>' +
                    '<div class="lgd-back-hero">' +
                        '<img class="lgd-back-hero-img" src="' + c.img + '" alt="' + c.name + '">' +
                        '<div class="lgd-back-hero-overlay"></div>' +
                        '<div class="lgd-back-hero-text">' +
                            '<div class="lgd-back-name">' + c.name + '</div>' +
                            '<div class="lgd-back-price">' + c.price + '</div>' +
                            '<span class="lgd-back-badge">' + c.rarity + '</span>' +
                        '</div>' +
                    '</div>' +
                    '<div class="lgd-back-bottom">' +
                        '<div class="lgd-back-stats">' + statsHtml + '</div>' +
                        '<div class="lgd-back-divider"></div>' +
                        '<div class="lgd-back-owners-label">Pemilik Kartu</div>' +
                        '<div class="lgd-back-owners">' + ownersHtml + '</div>' +
                    '</div>' +
                '</div>' +
            '</div>' +
        '</div>';
    }
    grid.innerHTML = html;
    document.getElementById('pageInfo').textContent = (currentPage + 1) + ' / ' + totalPages;
    document.getElementById('btnPrev').disabled = currentPage === 0;
    document.getElementById('btnNext').disabled = currentPage >= totalPages - 1;
}

function handleCardClick(idx, el, ev) {
    if (window.innerWidth <= 768) {
        openLgdModal(idx, ev);
        return;
    }
    el.classList.toggle('flipped');
}

function flipBack(idx) {
    var el = document.getElementById('lgdcard-' + idx);
    if (el) el.classList.remove('flipped');
}

function changePage(dir) {
    currentPage += dir;
    if (currentPage < 0) currentPage = 0;
    if (currentPage >= totalPages) currentPage = totalPages - 1;
    renderGrid();
}

function openLgdModal(idx, event) {
    var c = LEGENDARY_CARDS[idx];
    var ownersHtml = c.owners.map(function(o) {
        return '<span class="lgd-m-owner-badge">' + o + '</span>';
    }).join('');
    var html =
        '<div class="lgd-m-top">' +
            '<img class="lgd-m-img" src="' + c.img + '" alt="' + c.name + '">' +
            '<div class="lgd-m-info">' +
                '<div class="lgd-m-name">' + c.name + '</div>' +
                '<div class="lgd-m-price">' + c.price + '</div>' +
                '<span class="lgd-m-badge">' + c.rarity + '</span>' +
                '<div class="lgd-m-stats">' +
                    '<span class="lgd-m-stat">' + c.terambil + ' Terambil</span>' +
                    '<span class="lgd-m-stat">' + c.pemilik + ' Pemilik</span>' +
                    '<span class="lgd-m-stat">' + c.pull + ' Pull</span>' +
                    '<span class="lgd-m-stat">' + c.completion + ' Completion</span>' +
                '</div>' +
            '</div>' +
        '</div>' +
        '<div class="lgd-m-divider"></div>' +
        '<div class="lgd-m-owners-label">Pemilik Kartu</div>' +
        '<div class="lgd-m-owners">' + ownersHtml + '</div>';

    document.getElementById('lgdModalContent').innerHTML = html;

    // Set transform-origin berdasarkan posisi card yang diklik
    var box = document.querySelector('.lgd-modal-box');
    if (event && event.currentTarget) {
        var rect = event.currentTarget.getBoundingClientRect();
        var overlayEl = document.getElementById('lgdModal');
        var overlayRect = overlayEl.getBoundingClientRect ? overlayEl.getBoundingClientRect() : {left:0,top:0,width:window.innerWidth,height:window.innerHeight};
        // Hitung posisi card relatif terhadap overlay
        var ox = rect.left + rect.width/2 - (window.innerWidth/2 - 630);
        var oy = rect.top + rect.height/2 - (window.innerHeight/2 - 290);
        box.style.transformOrigin = Math.max(0,Math.min(100, ox/5.2*100/100)) + '% ' + Math.max(0,Math.min(100, oy/2.9*100/100)) + '%';
    } else {
        box.style.transformOrigin = 'center center';
    }

    document.getElementById('lgdModal').classList.add('show');
}

function closeLgdModal() {
    document.getElementById('lgdModal').classList.remove('show');
}

renderGrid();
</script>

</html>
