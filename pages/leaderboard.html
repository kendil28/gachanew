<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard - GachaKeren</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&family=Rowdies:wght@300;400;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Poppins', sans-serif;
  background: transparent;
  min-height: 100vh;
  width: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 20px 16px 100px 16px;
  color: #fff;
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 3px; }

/* ===== DECORATIVE IMAGES ===== */
.lb-deco-wrap {
  position: relative;
  overflow: visible;
  padding: 0 45px 0 110px;
  max-width: 100%;
  margin: 0 auto;
}

/* ===== MAIN PANEL ===== */
.lb-panel {
  max-width: calc(100% - 275px);
  margin: 49px auto 0;
  background: rgba(255, 255, 255, 0.15);
  border: 4px solid transparent;
  background-image: linear-gradient(rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.15)),
                    linear-gradient(45deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
  background-origin: border-box;
  background-clip: padding-box, border-box;
  border-radius: 25px;
  backdrop-filter: blur(15px); 
  box-shadow: 0 0 30px rgba(255, 107, 107, 0.3),
              0 0 60px rgba(252, 202, 87, 0.2),
              10px 10px 0px rgba(0,0,0,0.2);
  animation: containerGlow 3s ease-in-out infinite alternate;
  overflow: visible;
  display: flex;
  flex-direction: column;
  padding-bottom: 20px;
  position: relative;
  z-index: 1;
}

/* Inner scrollable area — tabs tetap visible, konten di bawahnya scroll */
.lb-inner-scroll {
  max-height: calc(80vh - 90px);
  overflow-y: auto;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  min-height: 0;
}
.lb-inner-scroll::-webkit-scrollbar { width: 4px; }
.lb-inner-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

@keyframes containerGlow {
  0% { box-shadow: 0 0 30px rgba(255, 107, 107, 0.3), 0 0 60px rgba(252, 202, 87, 0.2), 10px 10px 0px rgba(0,0,0,0.2); }
  100% { box-shadow: 0 0 40px rgba(72, 219, 251, 0.4), 0 0 80px rgba(255, 159, 243, 0.3), 10px 10px 0px rgba(0,0,0,0.2); }
}

.deco-ash {
  position: absolute;
  left: 16px;
  bottom: -29px;
  width: 259px;
  height: auto;
  z-index: 10;
  filter: drop-shadow(4px 0 12px rgba(0,0,0,0.4));
  pointer-events: none;
}

.deco-pikachu {
  position: absolute;
  right: 8px;
  bottom: 274px;
  width: 154px;
  height: auto;
  z-index: 0;
  filter: drop-shadow(-4px 0 12px rgba(0,0,0,0.3));
  pointer-events: none;
}

.podium-header-img {
  text-align: center;
  margin-bottom: -8px;
  position: relative;
  z-index: 5;
}
.podium-header-img img {
  max-width: 100%;
  height: 160px;
  object-fit: contain;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
}

@media (max-width: 1100px) {
  .lb-deco-wrap { padding: 0 100px; }
  .deco-ash { width: 196px; }
  .deco-pikachu { width: 112px; }
  .podium-header-img img { height: 130px; }
}
@media (max-width: 640px) {
  .lb-deco-wrap { padding: 0; }
  .deco-ash { display: none; }
  .deco-pikachu { display: none; }
  .podium-header-img img { height: 90px; }
}

/* ===== TABS ===== */
.lb-tabs {
  position: relative;
  width: 100%;
  display: flex;
  justify-content: space-between;
  gap: 12px;
  z-index: 3;
  overflow: visible;
  padding-top: 20px;
}

.lb-tab-wrap {
  position: relative;
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 20px;
}

.lb-tab-wrap .lb-tab-icon {
  position: absolute;
  top: 0;
  width: 45px;
  height: 45px;
  z-index: 10;
  filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.3));
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  pointer-events: none;
}

.lb-tab-wrap:hover .lb-tab-icon {
  filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.4)) brightness(1.1);
}

.lb-tab-wrap:has(.active) .lb-tab-icon {
  filter: drop-shadow(3px 3px 0px rgba(0,0,0,0.4)) brightness(1.2);
  animation: iconFloat 2s ease-in-out infinite;
}

.lb-tab {
  position: relative;
  width: 100%;
  height: 70px;
  border-radius: 16px;
  border: 4px solid transparent;
  color: #FFFFFF;
  font-family: 'Rowdies', cursive;
  font-weight: 700;
  font-size: 1.2rem;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding-bottom: 0;
  box-sizing: border-box;
  box-shadow: 5px 5px 0px rgba(0, 0, 0, 0.35);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  text-shadow: 2px 2px 0px rgba(0,0,0,0.5);
  background: #888;
  filter: brightness(0.7);
  overflow: hidden;
}

@keyframes iconFloat {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-3px); }
}

.lb-tab::before {
  content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
  background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
  transform: translateX(-100%);
  transition: transform 0.6s;
  z-index: -1;
}

.lb-tab:hover::before {
  transform: translateX(100%);
}

.lb-tab.active {
  filter: brightness(1.2); 
  transform: translateY(-5px) scale(1.05); 
  box-shadow: 0 10px 25px rgba(0,0,0,0.4), 0 0 20px rgba(255,255,255,0.3);
  animation: tabGlow 2s ease-in-out infinite;
}

.lb-tab:active { 
  transform: translate(2px, 2px); 
  box-shadow: 2px 2px 0px rgba(0,0,0,0.35); 
}

.lb-tab::after {
  content: ''; position: absolute; width: 14px; height: calc(14px * 1.8); top: 2px; left: 5px;
  background: linear-gradient(143.13deg, #FFFFFF 20%, rgba(255, 255, 255, 0) 53.65%); border-radius: 50%;
  pointer-events: none;
}
/* Individual tab colors like DEPOSIT page */
.lb-tab:nth-child(1) { 
  background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #48dbfb 100%);
  border-color: transparent;
}
.lb-tab:nth-child(2) { 
  background: linear-gradient(135deg, #a855f7 0%, #ec4899 50%, #f472b6 100%);
  border-color: transparent;
}
.lb-tab:nth-child(3) { 
  background: linear-gradient(135deg, #10b981 0%, #34d399 50%, #6ee7b7 100%);
  border-color: transparent;
}
.lb-tab:nth-child(4) { 
  background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 50%, #fde047 100%);
  border-color: transparent;
}

@keyframes tabGlow {
  0%, 100% { box-shadow: 0 10px 25px rgba(0,0,0,0.4), 0 0 20px rgba(255,255,255,0.3); }
  50% { box-shadow: 0 10px 25px rgba(0,0,0,0.4), 0 0 30px rgba(255,255,255,0.5); }
}

@keyframes headerPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.02); }
}

/* ===== HEADER BAR ===== */
.lb-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  background: rgba(0, 0, 0, 0.6);
  border-bottom: 1px solid rgba(255,255,255,0.2);
}
.lb-timer {
  display: flex; align-items: center; gap: 8px;
  background: rgba(0, 0, 0, 0.5);
  border-radius: 20px; padding: 6px 14px;
  font-size: 16px; font-weight: 700;
  border: 1px solid rgba(255,255,255,0.3);
  color: #fff;
}
.lb-timer .timer-icon { font-size: 18px; }
.lb-timer span { font-family: 'Luckiest Guy', cursive; letter-spacing: 1px; color: #FFD700; font-size: 20px; }

.lb-level {
  text-align: center;
}
.lb-level-label {
  font-size: 14px; font-weight: 700; color: #fff;
  letter-spacing: 2px; text-transform: uppercase;
}
.lb-progress-wrap {
  display: flex; align-items: center; gap: 6px; margin-top: 2px;
}
.lb-progress-bar {
  width: 160px; height: 14px;
  background: rgba(0,0,0,0.4);
  border-radius: 7px; overflow: hidden;
  border: 1px solid rgba(255,255,255,0.2);
}
.lb-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #ff6b35, #FFD700);
  border-radius: 7px;
  transition: width 1s ease;
}
.lb-progress-text { font-size: 13px; color: #fff; }

.lb-season-btn {
  background: linear-gradient(135deg, #FFD700, #FFA000);
  color: #000; font-family: 'Luckiest Guy', cursive;
  font-size: 18px; padding: 10px 22px;
  border-radius: 20px; border: none; cursor: pointer;
  box-shadow: 0 4px 12px rgba(255,160,0,0.5);
  letter-spacing: 1px;
  transition: transform 0.15s;
}
.lb-season-btn:hover { transform: scale(1.05); }

/* ===== CONTENT ===== */
.lb-content {
  display: flex;
  gap: 16px;
  padding: 16px 20px;
}

/* ===== PODIUM ===== */
.lb-podium-wrap {
  flex: 0 0 380px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.podium {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 8px;
  padding: 16px 8px 0;
  position: relative;
}

.podium-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}

/* Trophy icons */
.trophy-wrap {
  position: relative;
  margin-bottom: -8px;
  z-index: 2;
}
.trophy {
  font-size: 52px;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
  animation: trophyFloat 3s ease-in-out infinite;
}
.podium-item.rank-2 .trophy { font-size: 40px; animation-delay: 0.5s; }
.podium-item.rank-3 .trophy { font-size: 36px; animation-delay: 1s; }

@keyframes trophyFloat {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-6px); }
}

.podium-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  position: absolute; top: 4px; left: 50%;
  transform: translateX(-50%);
  border: 2px solid rgba(255,255,255,0.8);
  overflow: hidden; background: #1a3a6e;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.podium-item.rank-2 .podium-avatar { width: 34px; height: 34px; top: 3px; }
.podium-item.rank-3 .podium-avatar { width: 30px; height: 30px; top: 2px; }

/* Podium base */
.podium-base {
  border-radius: 10px 10px 0 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end;
  padding: 8px 6px;
  min-width: 80px;
  position: relative;
  overflow: hidden;
}
.podium-base::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 50%);
}
.podium-item.rank-1 .podium-base {
  height: 90px;
  background: linear-gradient(180deg, #e53935, #b71c1c);
  box-shadow: 0 6px 20px rgba(229,57,53,0.5);
}
.podium-item.rank-2 .podium-base {
  height: 70px;
  background: linear-gradient(180deg, #546e7a, #37474f);
  box-shadow: 0 4px 14px rgba(84,110,122,0.5);
}
.podium-item.rank-3 .podium-base {
  height: 55px;
  background: linear-gradient(180deg, #bf8040, #8d5524);
  box-shadow: 0 4px 14px rgba(191,128,64,0.5);
}

.podium-rank-num {
  font-family: 'Luckiest Guy', cursive;
  font-size: 28px; color: #fff;
  text-shadow: 0 2px 6px rgba(0,0,0,0.5);
  position: relative; z-index: 1;
}
.podium-item.rank-2 .podium-rank-num { font-size: 22px; }
.podium-item.rank-3 .podium-rank-num { font-size: 20px; }

.podium-name {
  font-size: 13px; font-weight: 700; color: #333;
  text-align: center; margin-top: 4px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 90px;
}
.podium-score {
  font-size: 12px; color: #666; font-weight: 700;
  text-align: center; max-width: 90px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* Confetti */
.confetti-wrap {
  position: absolute; top: 0; left: 0; right: 0;
  height: 60px; pointer-events: none; overflow: hidden;
}
.confetti-piece {
  position: absolute;
  width: 6px; height: 10px;
  border-radius: 2px;
  animation: confettiFall 2.5s ease-in infinite;
}
@keyframes confettiFall {
  0%   { transform: translateY(-10px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(60px) rotate(360deg); opacity: 0; }
}

/* Podium buttons */
.podium-btns {
  display: flex; gap: 10px;
}
.podium-btn {
  flex: 1; padding: 10px;
  border-radius: 20px; border: none; cursor: pointer;
  font-family: 'Luckiest Guy', cursive;
  font-size: 18px; letter-spacing: 0.5px;
  transition: transform 0.15s, box-shadow 0.15s;
}
.podium-btn:hover { transform: translateY(-2px); }
.podium-btn.prizes {
  background: linear-gradient(135deg, #ff6b35, #e53935);
  color: #fff; box-shadow: 0 4px 12px rgba(229,57,53,0.4);
}

/* ===== RANKING LIST ===== */
.lb-list-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.rank-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: 14px;
  transition: transform 0.15s;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  background: rgba(0, 0, 0, 0.4);
  border: 1px solid rgba(255,255,255,0.15);
}
.rank-row::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, rgba(255,255,255,0.05) 0%, transparent 60%);
}
.rank-row:hover { transform: translateX(4px); background: rgba(0, 0, 0, 0.5); }

.rank-row.r1 { background: rgba(255,215,0,0.15); border: 1px solid rgba(255,215,0,0.4); }
.rank-row.r2 { background: rgba(192,192,192,0.12); border: 1px solid rgba(192,192,192,0.3); }
.rank-row.r3 { background: rgba(205,127,50,0.12); border: 1px solid rgba(205,127,50,0.4); }
.rank-row.r-other { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255,255,255,0.1); }
.rank-row.r-me { background: rgba(79,195,247,0.15); border: 1px solid rgba(79,195,247,0.5); }

.rank-num {
  width: 32px; text-align: center;
  font-family: 'Luckiest Guy', cursive;
  font-size: 20px; flex-shrink: 0;
}
.rank-row.r1 .rank-num { color: #FFD700; }
.rank-row.r2 .rank-num { color: #C0C0C0; }
.rank-row.r3 .rank-num { color: #CD7F32; }
.rank-row.r-other .rank-num { color: #fff; }

.rank-crown {
  font-size: 18px; flex-shrink: 0;
}

.rank-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,0.1);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
  border: 2px solid rgba(255,255,255,0.2);
}

.rank-info { flex: 1; min-width: 0; }
.rank-name {
  font-size: 16px; font-weight: 700; color: #fff;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.rank-sub { font-size: 13px; color: rgba(255,255,255,0.7); }

.rank-score {
  display: flex; align-items: center; gap: 5px;
  font-family: 'Luckiest Guy', cursive;
  font-size: 15px; color: #FFD700; flex-shrink: 0;
  text-align: right;
}

/* My rank bar */
.my-rank-bar {
  background: rgba(0, 0, 0, 0.5);
  border: 1px solid rgba(79,195,247,0.4);
  border-radius: 12px;
  padding: 10px 14px;
  text-align: center;
  font-size: 15px; font-weight: 700;
  color: #fff;
  margin-top: 4px;
}
.my-rank-bar span { color: #4fc3f7; }

/* ===== RESPONSIVE ===== */
@media (max-width: 1100px) {
  .lb-panel { max-width: 100%; }
  .lb-podium-wrap { flex: 0 0 300px; }
}

@media (max-width: 640px) {
  body { padding: 8px 8px 160px; overflow-y: auto; }
  .lb-panel { max-width: 100%; border-radius: 20px; overflow: visible; padding-bottom: 20px; }
  .lb-inner-scroll { max-height: none; overflow: visible; }
  .lb-content { flex-direction: column; gap: 12px; padding: 12px 12px; overflow: visible; }
  .lb-podium-wrap { flex: none; width: 100%; overflow: visible; }
  .lb-list-wrap { overflow: visible; }
  .lb-tabs { padding-top: 20px; gap: 8px; }
  .lb-tab-wrap { padding-top: 20px; }
  .lb-tab-wrap .lb-tab-icon { width: 36px; height: 36px; }
  .lb-tab { font-size: 10px; height: 56px; justify-content: center; align-items: center; text-align: center; }
  .lb-header { flex-wrap: wrap; gap: 8px; padding: 10px 12px; }
  .lb-progress-bar { width: 100px; }
  .lb-progress-text { font-size: 11px; }
  .podium-base { min-width: 70px; }
  .trophy { font-size: 44px; }
  .lb-timer { font-size: 13px; padding: 5px 10px; }
  .lb-timer span { font-size: 15px; }
  .lb-season-btn { font-size: 13px; padding: 8px 14px; }
  .lb-level-label { font-size: 11px; }
  .rank-row { padding: 10px 12px; gap: 8px; }
  .rank-num { font-size: 16px; width: 26px; }
  .rank-avatar { width: 32px; height: 32px; font-size: 16px; }
  .rank-name { font-size: 14px; }
  .rank-sub { font-size: 11px; }
  .rank-score { font-size: 13px; }
  .my-rank-bar { font-size: 13px; padding: 8px 10px; }
  .podium-btn { font-size: 15px; padding: 9px; }
}
</style>

</head>
<body>
<script src="../js/header.js"></script>

<div class="lb-deco-wrap">

<div class="lb-panel">

  <!-- TABS -->
  <div class="lb-tabs">
    <div class="lb-tab-wrap">
      <img src="../assets/images/icons/icon/topspender.png" class="lb-tab-icon" alt="Top Spender">
      <div class="lb-tab active" onclick="switchTab('spender',this)">Top Spender</div>
    </div>
    <div class="lb-tab-wrap">
      <img src="../assets/images/icons/icon/topcollector.png" class="lb-tab-icon" alt="Top Collector">
      <div class="lb-tab" onclick="switchTab('collector',this)">Top Collector</div>
    </div>
    <div class="lb-tab-wrap">
      <img src="../assets/images/icons/icon/daily.png" class="lb-tab-icon" alt="Daily">
      <div class="lb-tab" onclick="switchTab('daily',this)">Daily</div>
    </div>
    <div class="lb-tab-wrap">
      <img src="../assets/images/icons/icon/weekly.png" class="lb-tab-icon" alt="Weekly">
      <div class="lb-tab" onclick="switchTab('weekly',this)">Weekly</div>
    </div>
  </div>

  <!-- HEADER -->
  <div class="lb-inner-scroll">
  <div class="lb-header">
    <div class="lb-timer">
      <span class="timer-icon">⏱️</span>
      <span id="timerDisplay">23:59:59</span>
    </div>
    <div class="lb-level">
      <div class="lb-level-label" id="seasonLabel">SEASON 1</div>
      <div class="lb-progress-wrap">
        <div class="lb-progress-bar">
          <div class="lb-progress-fill" id="progressFill" style="width:72%"></div>
        </div>
        <div class="lb-progress-text" id="progressText">72% selesai</div>
      </div>
    </div>
    <button class="lb-season-btn" onclick="openModal('prizes')">🏆 PRIZES</button>
  </div>

  <!-- CONTENT -->
  <div class="lb-content">

    <!-- PODIUM -->
    <div class="lb-podium-wrap">
      <div class="podium-header-img">
        <img src="../assets/images/ui/header.png" alt="Pokemon Header"/>
      </div>
      <div class="podium" id="podium">
        <!-- Confetti -->
        <div class="confetti-wrap" id="confetti"></div>

        <!-- Rank 2 -->
        <div class="podium-item rank-2">
          <div class="trophy-wrap">
            <div class="trophy">🥈</div>
            <div class="podium-avatar" id="p2-avatar">💸</div>
          </div>
          <div class="podium-base">
            <div class="podium-rank-num">2</div>
          </div>
          <div class="podium-name" id="p2-name">BigSpender</div>
          <div class="podium-score" id="p2-score">Rp 12,200,000</div>
        </div>

        <!-- Rank 1 -->
        <div class="podium-item rank-1">
          <div class="trophy-wrap">
            <div class="trophy">🏆</div>
            <div class="podium-avatar" id="p1-avatar">💰</div>
          </div>
          <div class="podium-base">
            <div class="podium-rank-num">1</div>
          </div>
          <div class="podium-name" id="p1-name">WhaleKing</div>
          <div class="podium-score" id="p1-score">Rp 15,500,000</div>
        </div>

        <!-- Rank 3 -->

// ===== RENDER RANKING LIST =====
function renderList(tab) {
  var players = tabPlayers[tab];
  var list = document.getElementById('rankList');
  var myRankNum = '';
  var rows = players.map(function(p) {
    var cls = p.rank === 1 ? 'r1' : p.rank === 2 ? 'r2' : p.rank === 3 ? 'r3' : p.isMe ? 'r-me' : 'r-other';
    if (p.isMe) myRankNum = p.rank;
    return '<div class="rank-row ' + cls + '">' +
      '<div class="rank-num">' + p.rank + '</div>' +
      (p.crown ? '<div class="rank-crown">' + p.crown + '</div>' : '<div style="width:18px;flex-shrink:0"></div>') +
      '<div class="rank-avatar">' + p.emoji + '</div>' +
      '<div class="rank-info">' +
        '<div class="rank-name">' + p.name + (p.isMe ? ' <span style="color:#4fc3f7;font-size:10px">(Kamu)</span>' : '') + '</div>' +
        '<div class="rank-sub">Peringkat #' + p.rank + ' musim ini</div>' +
      '</div>' +
      '<div class="rank-score">' + p.score + '</div>' +
    '</div>';
  }).join('');

  var subLabel = tab === 'spender' ? 'Terus belanja untuk naik peringkat! 💰'
               : tab === 'collector' ? 'Kumpulkan lebih banyak kartu! 🃏'

    '<div class="my-rank-bar">Peringkatmu: <span>#' + (myRankNum || '—') + '</span> — ' + subLabel + '</div>';

// ===== SWITCH TAB =====
function switchTab(tab, el) {
  document.querySelectorAll('.lb-tab').forEach(function(t){ t.classList.remove('active'); });
  el.classList.add('active');
  currentTab = tab;
  var cfg = tabConfig[tab];
  totalSecs = cfg.timer;
  document.getElementById('progressFill').style.width = cfg.progress + '%';
  document.getElementById('seasonLabel').textContent  = cfg.season;
  document.getElementById('progressText').textContent = cfg.desc;
  renderList(tab);
  updatePodium(tab);
}

// ===== TIMER =====
function updateTimer() {
  var h = Math.floor(totalSecs / 3600);
  var m = Math.floor((totalSecs % 3600) / 60);
  var s = totalSecs % 60;
  document.getElementById('timerDisplay').textContent =
    String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  if (totalSecs > 0) totalSecs--;
}
